name: OddsPortal Historical V3 Probe

on:
  workflow_dispatch:
    inputs:
      match_links:
        description: Paste OddsPortal tournament/results pages OR exact historical match URLs. Separate with commas, pipes, or new lines.
        required: true
        default: ''
      discover_match_links:
        description: true = first discover exact match URLs from the pages you pasted, then probe those match pages.
        required: false
        default: 'true'
      max_discovered_links:
        description: Max exact match URLs to discover and probe.
        required: false
        default: '30'
      bookmaker:
        description: Target bookmaker text to search for.
        required: false
        default: 'bet365'
      wait_ms:
        description: Milliseconds to wait after page load/clicks.
        required: false
        default: '6000'
      timeout_ms:
        description: Page load timeout milliseconds.
        required: false
        default: '45000'
      headless:
        description: true for CI. false only for local/manual debugging.
        required: false
        default: 'true'

jobs:
  probe:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Playwright
        shell: bash
        run: |
          npm init -y >/dev/null 2>&1 || true
          npm install playwright
          npx playwright install --with-deps chromium

      - name: Discover exact OddsPortal match links
        if: ${{ github.event.inputs.discover_match_links == 'true' }}
        shell: bash
        env:
          MATCH_LINKS: ${{ github.event.inputs.match_links }}
          WAIT_MS: ${{ github.event.inputs.wait_ms }}
          TIMEOUT_MS: ${{ github.event.inputs.timeout_ms }}
          HEADLESS: ${{ github.event.inputs.headless }}
          MAX_DISCOVERED_LINKS: ${{ github.event.inputs.max_discovered_links }}
        run: |
          node scripts/discover-oddsportal-match-links.mjs

      - name: Run OddsPortal historical V3 probe
        shell: bash
        env:
          MATCH_LINKS: ${{ github.event.inputs.match_links }}
          BOOKMAKER: ${{ github.event.inputs.bookmaker }}
          WAIT_MS: ${{ github.event.inputs.wait_ms }}
          TIMEOUT_MS: ${{ github.event.inputs.timeout_ms }}
          HEADLESS: ${{ github.event.inputs.headless }}
        run: |
          if [ "${{ github.event.inputs.discover_match_links }}" = "true" ] && [ -s artifacts/output/oddsportal-historical-v3-probe/discovered_match_links.txt ]; then
            node scripts/probe-oddsportal-historical-v3.mjs \
              --match-links-file=artifacts/output/oddsportal-historical-v3-probe/discovered_match_links.txt
          else
            node scripts/probe-oddsportal-historical-v3.mjs
          fi

      - name: Upload probe artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: oddsportal-historical-v3-probe
          path: artifacts/output/oddsportal-historical-v3-probe/**
          if-no-files-found: warn

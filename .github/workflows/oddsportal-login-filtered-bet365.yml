name: OddsPortal Login Filtered Bet365 Overnight Scrape

on:
  workflow_dispatch:
    inputs:
      mode:
        description: smoke validates V3 extraction. overnight discovers matches from tournament results pages.
        required: true
        default: smoke
        type: choice
        options:
          - smoke
          - overnight
      limit_total:
        description: Max match URLs to scrape in overnight mode. Use 0 for no total cap.
        required: false
        default: '120'
      max_matches_per_results:
        description: Max match links discovered per tournament results page. Use 0 for all discovered.
        required: false
        default: '25'
      wait_ms:
        description: Browser wait between page actions.
        required: false
        default: '4500'
      pause_seconds:
        description: Polite pause between match pages.
        required: false
        default: '1.5'

jobs:
  filtered-scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    env:
      PYTHONUNBUFFERED: '1'

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        shell: bash
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements-oddsportal.txt
          python -m playwright install --with-deps chromium

      - name: Check OddsPortal auth/session secret exists
        shell: bash
        env:
          ODDSPORTAL_USERNAME: ${{ secrets.ODDSPORTAL_USERNAME }}
          ODDSPORTAL_PASSWORD: ${{ secrets.ODDSPORTAL_PASSWORD }}
          ODDSPORTAL_STORAGE_STATE_B64: ${{ secrets.ODDSPORTAL_STORAGE_STATE_B64 }}
          ODDSPORTAL_COOKIES_JSON: ${{ secrets.ODDSPORTAL_COOKIES_JSON }}
          ODDSPORTAL_COOKIES_JSON_B64: ${{ secrets.ODDSPORTAL_COOKIES_JSON_B64 }}
        run: |
          if [ -z "$ODDSPORTAL_STORAGE_STATE_B64" ] && [ -z "$ODDSPORTAL_COOKIES_JSON" ] && [ -z "$ODDSPORTAL_COOKIES_JSON_B64" ] && { [ -z "$ODDSPORTAL_USERNAME" ] || [ -z "$ODDSPORTAL_PASSWORD" ]; }; then
            echo "Set ODDSPORTAL_COOKIES_JSON, ODDSPORTAL_COOKIES_JSON_B64, ODDSPORTAL_STORAGE_STATE_B64, or both ODDSPORTAL_USERNAME and ODDSPORTAL_PASSWORD as repository secrets."
            exit 2
          fi
          echo "OddsPortal auth/session secret found."

      - name: Run soft filtered bet365 smoke test
        shell: bash
        env:
          ODDSPORTAL_USERNAME: ${{ secrets.ODDSPORTAL_USERNAME }}
          ODDSPORTAL_PASSWORD: ${{ secrets.ODDSPORTAL_PASSWORD }}
          ODDSPORTAL_STORAGE_STATE_B64: ${{ secrets.ODDSPORTAL_STORAGE_STATE_B64 }}
          ODDSPORTAL_COOKIES_JSON: ${{ secrets.ODDSPORTAL_COOKIES_JSON }}
          ODDSPORTAL_COOKIES_JSON_B64: ${{ secrets.ODDSPORTAL_COOKIES_JSON_B64 }}
        run: |
          echo "Running soft smoke test. This verifies the scraper can extract 3:6 / 4:6 / 5:7 prices from the page OddsPortal lands on. Manual double-check still required."
          python -u scripts/oddsportal_results_driven_bet365_scraper.py \
            --results-urls-file data/oddsportal_major_results_urls.txt \
            --limit-total 0 \
            --max-matches-per-results 0 \
            --out artifacts/output/oddsportal-login-filtered-bet365-smoke \
            --wait-ms '${{ github.event.inputs.wait_ms }}' \
            --pause-seconds '${{ github.event.inputs.pause_seconds }}' \
            --smoke-only

      - name: Run results-page driven filtered bet365 overnight scrape
        if: ${{ github.event.inputs.mode == 'overnight' }}
        shell: bash
        env:
          ODDSPORTAL_USERNAME: ${{ secrets.ODDSPORTAL_USERNAME }}
          ODDSPORTAL_PASSWORD: ${{ secrets.ODDSPORTAL_PASSWORD }}
          ODDSPORTAL_STORAGE_STATE_B64: ${{ secrets.ODDSPORTAL_STORAGE_STATE_B64 }}
          ODDSPORTAL_COOKIES_JSON: ${{ secrets.ODDSPORTAL_COOKIES_JSON }}
          ODDSPORTAL_COOKIES_JSON_B64: ${{ secrets.ODDSPORTAL_COOKIES_JSON_B64 }}
        run: |
          echo "Starting filtered bet365 historical scrape at $(date -u). Input is tournament results pages, not individual match URLs."
          python -u scripts/oddsportal_results_driven_bet365_scraper.py \
            --results-urls-file data/oddsportal_major_results_urls.txt \
            --limit-total '${{ github.event.inputs.limit_total }}' \
            --max-matches-per-results '${{ github.event.inputs.max_matches_per_results }}' \
            --out artifacts/output/oddsportal-login-filtered-bet365-overnight \
            --wait-ms '${{ github.event.inputs.wait_ms }}' \
            --pause-seconds '${{ github.event.inputs.pause_seconds }}'
          echo "Finished filtered bet365 historical scrape at $(date -u)."

      - name: Backtest filtered overnight result
        if: ${{ always() && github.event.inputs.mode == 'overnight' }}
        shell: bash
        run: |
          if [ -f artifacts/output/oddsportal-login-filtered-bet365-overnight/bet365_master_odds_db.csv ]; then
            python -u scripts/backtest_bet365_v3_from_csv.py \
              --csv artifacts/output/oddsportal-login-filtered-bet365-overnight/bet365_master_odds_db.csv \
              --out artifacts/output/backtest-login-filtered-bet365 \
              --stake 100
          fi

      - name: Upload filtered scrape artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: oddsportal-login-filtered-bet365-${{ github.event.inputs.mode }}
          path: artifacts/output/**
          if-no-files-found: warn

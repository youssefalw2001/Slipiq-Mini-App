name: API Tennis Wide-Net Strategy Discovery

on:
  workflow_dispatch:
    inputs:
      artifact_name:
        description: Name of combined warehouse artifact.
        required: false
        default: 'api-tennis-full-historical-odds-warehouse-combined'
      start_bankroll:
        description: Starting bankroll for compound simulation.
        required: false
        default: '5000'
      min_bets:
        description: Minimum bets for leaderboard rules.
        required: false
        default: '100'
      min_test_bets:
        description: Minimum bets in month-7 test period.
        required: false
        default: '15'
      min_validate_bets:
        description: Minimum bets in month-8 validate period.
        required: false
        default: '15'
      max_rules:
        description: Number of strongest aggregate rules to fully simulate after fast pre-score.
        required: false
        default: '800'
      books:
        description: Comma-separated bookmaker filter for speed.
        required: false
        default: 'bet365,1xBet'

jobs:
  discover:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    permissions:
      actions: read
      contents: read

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Download latest combined warehouse artifact
        uses: dawidd6/action-download-artifact@v6
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          workflow: api-tennis-full-historical-odds-warehouse.yml
          workflow_conclusion: completed
          name: ${{ github.event.inputs.artifact_name }}
          path: artifacts/input/warehouse
          if_no_artifact_found: fail

      - name: Extract warehouse zip
        shell: bash
        run: |
          ZIP_PATH=$(find artifacts/input/warehouse -type f -name 'api-tennis-full-historical-odds-warehouse-combined.zip' | head -n 1)
          if [ -z "$ZIP_PATH" ]; then
            echo "Warehouse zip not found. Files available:"
            find artifacts/input/warehouse -type f | sort
            exit 2
          fi
          mkdir -p artifacts/input/warehouse/extracted
          unzip -q "$ZIP_PATH" -d artifacts/input/warehouse/extracted
          echo "Extracted files:"
          find artifacts/input/warehouse/extracted -maxdepth 1 -type f | sort

      - name: Locate inputs
        id: locate
        shell: bash
        run: |
          FIRST_SET=$(find artifacts/input/warehouse/extracted -type f -name 'first_set_correct_score_wide_combined.csv' | head -n 1)
          FIXTURES=$(find artifacts/input/warehouse/extracted -type f -name 'fixtures_full_combined.csv' | head -n 1)
          MONEYLINE=$(find artifacts/input/warehouse/extracted -type f -name 'moneyline_favorite_combined.csv' | head -n 1)
          if [ -z "$FIRST_SET" ]; then
            echo "Missing first-set wide file."
            find artifacts/input/warehouse/extracted -type f | sort
            exit 2
          fi
          echo "first_set=$FIRST_SET" >> "$GITHUB_OUTPUT"
          echo "fixtures=$FIXTURES" >> "$GITHUB_OUTPUT"
          echo "moneyline=$MONEYLINE" >> "$GITHUB_OUTPUT"
          echo "First set: $FIRST_SET"
          echo "Fixtures: $FIXTURES"
          echo "Moneyline: $MONEYLINE"

      - name: Run fast wide-net strategy discovery
        shell: bash
        run: |
          python scripts/api_tennis_wide_net_strategy_discovery.py \
            --input-csv='${{ steps.locate.outputs.first_set }}' \
            --fixtures='${{ steps.locate.outputs.fixtures }}' \
            --moneyline='${{ steps.locate.outputs.moneyline }}' \
            --out=artifacts/output/api-tennis-wide-net-strategy-discovery \
            --start-bankroll='${{ github.event.inputs.start_bankroll }}' \
            --min-bets='${{ github.event.inputs.min_bets }}' \
            --min-test-bets='${{ github.event.inputs.min_test_bets }}' \
            --min-validate-bets='${{ github.event.inputs.min_validate_bets }}' \
            --max-rules='${{ github.event.inputs.max_rules }}' \
            --books='${{ github.event.inputs.books }}'

      - name: Upload wide-net artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: api-tennis-wide-net-strategy-discovery
          path: |
            artifacts/output/api-tennis-wide-net-strategy-discovery/wide_net_strategy_report.md
            artifacts/output/api-tennis-wide-net-strategy-discovery/wide_net_strategy_audit.json
            artifacts/output/api-tennis-wide-net-strategy-discovery/wide_net_strategy_cards.json
            artifacts/output/api-tennis-wide-net-strategy-discovery/wide_net_strategy_leaderboard.csv
            artifacts/output/api-tennis-wide-net-strategy-discovery/wide_net_strategy_top_snipers.csv
            artifacts/output/api-tennis-wide-net-strategy-discovery/wide_net_strategy_train_test.csv
            artifacts/output/api-tennis-wide-net-strategy-discovery/wide_net_strategy_risk_sims.csv
            artifacts/output/api-tennis-wide-net-strategy-discovery/wide_net_strategy_monthly.csv
            artifacts/output/api-tennis-wide-net-strategy-discovery/wide_net_strategy_bankroll_curves.json
          if-no-files-found: warn

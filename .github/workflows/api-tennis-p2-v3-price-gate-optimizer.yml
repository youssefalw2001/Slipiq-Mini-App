name: API Tennis P2 V3 Price Gate Optimizer

on:
  workflow_dispatch:
    inputs:
      artifact_name:
        description: Name of combined warehouse artifact.
        required: false
        default: 'api-tennis-full-historical-odds-warehouse-combined'
      trigger_min:
        description: Lower bound for P2 4:6 trigger odds.
        required: false
        default: '6.25'
      trigger_max:
        description: Upper bound for P2 4:6 trigger odds.
        required: false
        default: '6.99'
      start_bankroll:
        description: Starting bankroll for compound simulation.
        required: false
        default: '5000'
      risk_pct:
        description: Risk per bet as decimal.
        required: false
        default: '0.02'

jobs:
  optimize:
    runs-on: ubuntu-latest
    timeout-minutes: 35
    permissions:
      actions: read
      contents: read

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Download latest combined warehouse artifact
        uses: dawidd6/action-download-artifact@v6
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          workflow: api-tennis-full-historical-odds-warehouse.yml
          workflow_conclusion: completed
          name: ${{ github.event.inputs.artifact_name }}
          path: artifacts/input/warehouse
          if_no_artifact_found: fail

      - name: Extract warehouse zip
        shell: bash
        run: |
          ZIP_PATH=$(find artifacts/input/warehouse -type f -name 'api-tennis-full-historical-odds-warehouse-combined.zip' | head -n 1)
          if [ -z "$ZIP_PATH" ]; then
            echo "Warehouse zip not found. Files available:"
            find artifacts/input/warehouse -type f | sort
            exit 2
          fi
          mkdir -p artifacts/input/warehouse/extracted
          unzip -q "$ZIP_PATH" -d artifacts/input/warehouse/extracted

      - name: Locate first-set wide input
        id: locate
        shell: bash
        run: |
          FIRST_SET=$(find artifacts/input/warehouse/extracted -type f -name 'first_set_correct_score_wide_combined.csv' | head -n 1)
          if [ -z "$FIRST_SET" ]; then
            echo "Missing first-set wide file."
            find artifacts/input/warehouse/extracted -type f | sort
            exit 2
          fi
          echo "first_set=$FIRST_SET" >> "$GITHUB_OUTPUT"

      - name: Run P2 V3 price gate optimizer
        shell: bash
        run: |
          python scripts/api_tennis_p2_v3_price_gate_optimizer.py \
            --first-set-wide='${{ steps.locate.outputs.first_set }}' \
            --out=artifacts/output/api-tennis-p2-v3-price-gate-optimizer \
            --trigger-min='${{ github.event.inputs.trigger_min }}' \
            --trigger-max='${{ github.event.inputs.trigger_max }}' \
            --start-bankroll='${{ github.event.inputs.start_bankroll }}' \
            --risk-pct='${{ github.event.inputs.risk_pct }}'

      - name: Upload P2 V3 price gate optimizer artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: api-tennis-p2-v3-price-gate-optimizer
          path: |
            artifacts/output/api-tennis-p2-v3-price-gate-optimizer/price_gate_results.csv
            artifacts/output/api-tennis-p2-v3-price-gate-optimizer/price_gate_leaderboard.csv
            artifacts/output/api-tennis-p2-v3-price-gate-optimizer/price_gate_funnel.json
            artifacts/output/api-tennis-p2-v3-price-gate-optimizer/price_gate_summary.json
            artifacts/output/api-tennis-p2-v3-price-gate-optimizer/price_gate_report.md
            artifacts/output/api-tennis-p2-v3-price-gate-optimizer/price_gate_bankroll_curves.csv
            artifacts/output/api-tennis-p2-v3-price-gate-optimizer/p2_v3_real_available_candidates.csv
          if-no-files-found: warn

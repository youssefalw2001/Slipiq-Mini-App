name: Probe Odds-API.io Tennis Markets

on:
  workflow_dispatch:

jobs:
  probe:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Probe tennis markets
        run: node scripts/probe-odds-api-io.mjs
        env:
          ODDS_API_IO_KEY: ${{ secrets.ODDS_API_IO_KEY }}

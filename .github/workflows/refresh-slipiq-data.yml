name: Refresh SlipIQ Data

on:
  workflow_dispatch:
  schedule:
    - cron: '17 */2 * * *'

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - name: Call Supabase data refresh
        run: |
          set -euo pipefail
          response=$(curl -sS -w '\n%{http_code}' -X POST \
            -H "x-slipiq-refresh-secret: ${SLIPIQ_REFRESH_SECRET}" \
            "${SLIPIQ_DATA_REFRESH_URL}")
          body=$(printf '%s' "$response" | sed '$d')
          status=$(printf '%s' "$response" | tail -n 1)
          echo "$body"
          if [ "$status" -lt 200 ] || [ "$status" -ge 300 ]; then
            echo "Refresh failed with status $status"
            exit 1
          fi
        env:
          SLIPIQ_DATA_REFRESH_URL: ${{ secrets.SLIPIQ_DATA_REFRESH_URL }}
          SLIPIQ_REFRESH_SECRET: ${{ secrets.SLIPIQ_REFRESH_SECRET }}

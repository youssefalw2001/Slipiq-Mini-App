name: Execution Feasibility Backtest

on:
  workflow_dispatch:
    inputs:
      input_path:
        description: "Enriched/combined CSV path to test for execution feasibility"
        required: true
        default: "artifacts/input/combined-2024-2026-enriched-first-set-scores.csv"

jobs:
  execution-feasibility-backtest:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Check input CSV exists
        shell: bash
        run: |
          set -euo pipefail
          if [ ! -f "${{ inputs.input_path }}" ]; then
            echo "Input CSV not found: ${{ inputs.input_path }}"
            echo "Upload/commit the combined CSV, or set input_path to an existing enriched CSV."
            exit 1
          fi
          wc -l "${{ inputs.input_path }}"

      - name: Run execution feasibility backtest
        shell: bash
        run: |
          set -euo pipefail
          node scripts/execution-feasibility-backtest.mjs \
            --input "${{ inputs.input_path }}" \
            --output-dir artifacts/output/execution-feasibility-backtest

      - name: Upload execution feasibility artifact
        uses: actions/upload-artifact@v4
        with:
          name: execution-feasibility-backtest
          path: artifacts/output/execution-feasibility-backtest
          if-no-files-found: error

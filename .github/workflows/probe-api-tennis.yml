name: Probe API-Tennis Markets

on:
  workflow_dispatch:

jobs:
  probe:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Probe API-Tennis markets
        run: node scripts/probe-api-tennis.mjs
        env:
          API_TENNIS_KEY: ${{ secrets.API_TENNIS_KEY }}

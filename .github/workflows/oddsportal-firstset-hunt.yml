name: OddsPortal First-Set Correct Score Hunt

on:
  push:
    paths:
      - '.github/workflows/oddsportal-firstset-hunt.yml'
      - 'scripts/analyze-oddsportal-firstset-hunt.mjs'
      - 'data/input/oddsportal-firstset-hunt/raw/**'
  workflow_dispatch:
    inputs:
      use_repo_raw:
        description: Analyze CSV/JSON files committed under data/input/oddsportal-firstset-hunt/raw instead of scraping
        required: true
        default: 'false'
      leagues:
        description: Comma-separated OddsHarvester tennis league slugs
        required: true
        default: 'atp-rome'
      seasons:
        description: Comma-separated seasons to test
        required: true
        default: '2025'
      markets:
        description: Comma-separated concrete OddsHarvester tennis correct-score markets
        required: true
        default: 'correct_score_3_6,correct_score_4_6,correct_score_5_7'
      period:
        description: Tennis period to scrape. Use 1st_set for SlipIQ First Set Lab.
        required: true
        default: '1st_set'
      max_pages:
        description: Max result pages per league/season
        required: true
        default: '1'
      request_delay:
        description: Seconds between match requests
        required: true
        default: '1.25'
      force_rescrape:
        description: Set true to ignore cache and scrape OddsPortal again
        required: true
        default: 'false'

jobs:
  oddsportal-firstset-hunt:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    env:
      USE_REPO_RAW: ${{ github.event.inputs.use_repo_raw || 'false' }}
      LEAGUES: ${{ github.event.inputs.leagues || 'atp-rome' }}
      SEASONS: ${{ github.event.inputs.seasons || '2025' }}
      MARKETS: ${{ github.event.inputs.markets || 'correct_score_3_6,correct_score_4_6,correct_score_5_7' }}
      PERIOD: ${{ github.event.inputs.period || '1st_set' }}
      MAX_PAGES: ${{ github.event.inputs.max_pages || '1' }}
      REQUEST_DELAY: ${{ github.event.inputs.request_delay || '1.25' }}
      FORCE_RESCRAPE: ${{ github.event.inputs.force_rescrape || 'false' }}
      REPO_RAW_DIR: data/input/oddsportal-firstset-hunt/raw
      OUT_ROOT: artifacts/output/oddsportal-firstset-hunt

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Normalize workflow flags
        shell: bash
        run: |
          echo "USE_REPO_RAW_NORM=$(echo "$USE_REPO_RAW" | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_ENV"
          echo "FORCE_RESCRAPE_NORM=$(echo "$FORCE_RESCRAPE" | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_ENV"
          SAFE_MARKETS="$(echo "$MARKETS" | tr ', /' '---' | tr -cd 'A-Za-z0-9_.+-')"
          SAFE_LEAGUES="$(echo "$LEAGUES" | tr ', /' '---' | tr -cd 'A-Za-z0-9_.+-')"
          SAFE_SEASONS="$(echo "$SEASONS" | tr ', /' '---' | tr -cd 'A-Za-z0-9_.+-')"
          SAFE_PERIOD="$(echo "$PERIOD" | tr ', /' '---' | tr -cd 'A-Za-z0-9_.+-')"
          echo "CACHE_KEY=oddsportal-raw-v3-${SAFE_LEAGUES}-${SAFE_SEASONS}-${SAFE_MARKETS}-${SAFE_PERIOD}-pages-${MAX_PAGES}" >> "$GITHUB_ENV"

      - name: Prepare repo-provided raw files
        id: repo_raw
        shell: bash
        run: |
          mkdir -p "$OUT_ROOT/raw" "$OUT_ROOT/logs"
          if [ -d "$REPO_RAW_DIR" ] && find "$REPO_RAW_DIR" -type f \( -iname '*.csv' -o -iname '*.json' -o -iname '*.txt' -o -iname '*.log' \) | grep -q .; then
            if [ "$USE_REPO_RAW_NORM" = "true" ] || [ "$GITHUB_EVENT_NAME" = "push" ]; then
              mkdir -p "$OUT_ROOT/raw/repo_uploaded"
              cp -R "$REPO_RAW_DIR"/. "$OUT_ROOT/raw/repo_uploaded/"
              echo "Using repo-provided raw files from $REPO_RAW_DIR" | tee "$OUT_ROOT/logs/repo-raw-input.log"
              find "$OUT_ROOT/raw/repo_uploaded" -type f -print | sort | tee -a "$OUT_ROOT/logs/repo-raw-input.log"
              echo "has_repo_raw=true" >> "$GITHUB_OUTPUT"
              exit 0
            fi
          fi
          echo "has_repo_raw=false" >> "$GITHUB_OUTPUT"

      - name: Set up Python
        if: steps.repo_raw.outputs.has_repo_raw != 'true'
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Restore raw OddsPortal CSV cache
        id: raw_cache
        if: steps.repo_raw.outputs.has_repo_raw != 'true' && env.FORCE_RESCRAPE_NORM != 'true'
        uses: actions/cache@v4
        with:
          path: artifacts/output/oddsportal-firstset-hunt/raw
          key: ${{ env.CACHE_KEY }}

      - name: Install OddsHarvester and Playwright
        if: steps.repo_raw.outputs.has_repo_raw != 'true' && (steps.raw_cache.outputs.cache-hit != 'true' || env.FORCE_RESCRAPE_NORM == 'true')
        run: |
          python -m pip install --upgrade pip
          python -m pip install oddsharvester
          python -m playwright install chromium --with-deps
          oddsharvester --help

      - name: Run OddsPortal tennis first-set correct-score hunt
        if: steps.repo_raw.outputs.has_repo_raw != 'true' && (steps.raw_cache.outputs.cache-hit != 'true' || env.FORCE_RESCRAPE_NORM == 'true')
        shell: bash
        run: |
          mkdir -p "$OUT_ROOT/raw" "$OUT_ROOT/logs"
          IFS=',' read -ra LEAGUE_LIST <<< "$LEAGUES"
          IFS=',' read -ra SEASON_LIST <<< "$SEASONS"
          for league in "${LEAGUE_LIST[@]}"; do
            league="$(echo "$league" | xargs)"
            [ -z "$league" ] && continue
            for season in "${SEASON_LIST[@]}"; do
              season="$(echo "$season" | xargs)"
              [ -z "$season" ] && continue
              slug="${league}_${season}_${PERIOD}"
              out="$OUT_ROOT/raw/$slug"
              echo "::group::OddsHarvester $league $season $MARKETS period=$PERIOD"
              mkdir -p "$out"
              set +e
              oddsharvester historic \
                -s tennis \
                -l "$league" \
                --season "$season" \
                -m "$MARKETS" \
                --period "$PERIOD" \
                --max-pages "$MAX_PAGES" \
                -f csv \
                -o "$out/first_set_correct_score_3_6_4_6_5_7" \
                --headless \
                --request-delay "$REQUEST_DELAY" \
                --concurrency 1 \
                > "$OUT_ROOT/logs/${slug}.log" 2>&1
              code=$?
              set -e
              echo "exit_code=$code" | tee "$out/status.txt"
              tail -n 160 "$OUT_ROOT/logs/${slug}.log" || true
              echo "::endgroup::"
            done
          done
          echo "Raw files:"
          find "$OUT_ROOT" -maxdepth 4 -type f -print | sort

      - name: Note raw cache hit
        if: steps.repo_raw.outputs.has_repo_raw != 'true' && steps.raw_cache.outputs.cache-hit == 'true' && env.FORCE_RESCRAPE_NORM != 'true'
        run: |
          mkdir -p "$OUT_ROOT/logs"
          echo "Using cached raw OddsPortal CSV output. Set force_rescrape=true to scrape again." | tee "$OUT_ROOT/logs/cache-hit.log"
          find "$OUT_ROOT/raw" -maxdepth 4 -type f -print | sort

      - name: Analyze OddsPortal output for 3-6 / 4-6 / 5-7
        run: |
          node scripts/analyze-oddsportal-firstset-hunt.mjs \
            --input-dir "$OUT_ROOT/raw" \
            --out-dir "$OUT_ROOT/analysis"

      - name: Upload hunt artifact
        uses: actions/upload-artifact@v4
        with:
          name: oddsportal-firstset-hunt
          path: |
            artifacts/output/oddsportal-firstset-hunt/raw/**
            artifacts/output/oddsportal-firstset-hunt/logs/**
            artifacts/output/oddsportal-firstset-hunt/analysis/**
          if-no-files-found: error

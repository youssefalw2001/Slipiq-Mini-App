name: OddsPortal Fast Constructed V3 Dataset

on:
  workflow_dispatch:
    inputs:
      limit_pages:
        description: Number of tournament result pages to parse into result rows.
        required: false
        default: '25'
      start_index:
        description: Start index inside result rows.
        required: false
        default: '0'
      limit_total:
        description: Number of result rows to enrich with direct bet365 V3 odds. Use 0 for all.
        required: false
        default: '200'
      wait_ms:
        description: Browser wait while collecting archive results and discovering token.
        required: false
        default: '2500'
      pause_seconds:
        description: Pause between constructed endpoint requests.
        required: false
        default: '0.15'
      stake:
        description: Flat stake for built-in summary calculations.
        required: false
        default: '100'

jobs:
  fast-constructed-v3-dataset:
    runs-on: ubuntu-latest
    timeout-minutes: 180
    env:
      PYTHONUNBUFFERED: '1'

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        shell: bash
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements-oddsportal.txt
          python -m playwright install --with-deps chromium

      - name: Check OddsPortal auth/session secret exists
        shell: bash
        env:
          ODDSPORTAL_USERNAME: ${{ secrets.ODDSPORTAL_USERNAME }}
          ODDSPORTAL_PASSWORD: ${{ secrets.ODDSPORTAL_PASSWORD }}
          ODDSPORTAL_STORAGE_STATE_B64: ${{ secrets.ODDSPORTAL_STORAGE_STATE_B64 }}
          ODDSPORTAL_COOKIES_JSON: ${{ secrets.ODDSPORTAL_COOKIES_JSON }}
          ODDSPORTAL_COOKIES_JSON_B64: ${{ secrets.ODDSPORTAL_COOKIES_JSON_B64 }}
        run: |
          if [ -z "$ODDSPORTAL_STORAGE_STATE_B64" ] && [ -z "$ODDSPORTAL_COOKIES_JSON" ] && [ -z "$ODDSPORTAL_COOKIES_JSON_B64" ] && { [ -z "$ODDSPORTAL_USERNAME" ] || [ -z "$ODDSPORTAL_PASSWORD" ]; }; then
            echo "Set ODDSPORTAL_COOKIES_JSON, ODDSPORTAL_COOKIES_JSON_B64, ODDSPORTAL_STORAGE_STATE_B64, or both ODDSPORTAL_USERNAME and ODDSPORTAL_PASSWORD as repository secrets."
            exit 2
          fi
          echo "OddsPortal auth/session secret found."

      - name: Build fast constructed V3 backtest-ready dataset
        shell: bash
        env:
          ODDSPORTAL_USERNAME: ${{ secrets.ODDSPORTAL_USERNAME }}
          ODDSPORTAL_PASSWORD: ${{ secrets.ODDSPORTAL_PASSWORD }}
          ODDSPORTAL_STORAGE_STATE_B64: ${{ secrets.ODDSPORTAL_STORAGE_STATE_B64 }}
          ODDSPORTAL_COOKIES_JSON: ${{ secrets.ODDSPORTAL_COOKIES_JSON }}
          ODDSPORTAL_COOKIES_JSON_B64: ${{ secrets.ODDSPORTAL_COOKIES_JSON_B64 }}
        run: |
          python -u scripts/oddsportal_fast_constructed_v3_dataset.py \
            --results-urls-file data/oddsportal_major_results_urls.txt \
            --out artifacts/output/oddsportal-fast-constructed-v3-dataset \
            --limit-pages '${{ github.event.inputs.limit_pages }}' \
            --start-index '${{ github.event.inputs.start_index }}' \
            --limit-total '${{ github.event.inputs.limit_total }}' \
            --wait-ms '${{ github.event.inputs.wait_ms }}' \
            --pause-seconds '${{ github.event.inputs.pause_seconds }}' \
            --stake '${{ github.event.inputs.stake }}'

      - name: Upload safe fast V3 dataset artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: oddsportal-fast-constructed-v3-dataset-safe
          path: |
            artifacts/output/oddsportal-fast-constructed-v3-dataset/run_summary.json
            artifacts/output/oddsportal-fast-constructed-v3-dataset/dataset_summary.json
            artifacts/output/oddsportal-fast-constructed-v3-dataset/fast_v3_report.md
            artifacts/output/oddsportal-fast-constructed-v3-dataset/fast_v3_backtest_ready.csv
            artifacts/output/oddsportal-fast-constructed-v3-dataset/first_set_results.csv
            artifacts/output/oddsportal-fast-constructed-v3-dataset/archive_results_endpoint_inventory.csv
          if-no-files-found: warn

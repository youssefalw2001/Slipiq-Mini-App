name: OddsPortal Decoded Tournament V3

on:
  workflow_dispatch:
    inputs:
      limit_total:
        description: Max match URLs to scrape. Use 0 for no total cap.
        required: false
        default: '20'
      max_matches_per_results:
        description: Max match links discovered per tournament results page. Use 0 for all discovered.
        required: false
        default: '20'
      wait_ms:
        description: Browser wait between page actions.
        required: false
        default: '4500'
      pause_seconds:
        description: Polite pause between match pages.
        required: false
        default: '1.5'

jobs:
  decoded-tournament-v3:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    env:
      PYTHONUNBUFFERED: '1'

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        shell: bash
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements-oddsportal.txt
          python -m playwright install --with-deps chromium

      - name: Check OddsPortal auth/session secret exists
        shell: bash
        env:
          ODDSPORTAL_USERNAME: ${{ secrets.ODDSPORTAL_USERNAME }}
          ODDSPORTAL_PASSWORD: ${{ secrets.ODDSPORTAL_PASSWORD }}
          ODDSPORTAL_STORAGE_STATE_B64: ${{ secrets.ODDSPORTAL_STORAGE_STATE_B64 }}
          ODDSPORTAL_COOKIES_JSON: ${{ secrets.ODDSPORTAL_COOKIES_JSON }}
          ODDSPORTAL_COOKIES_JSON_B64: ${{ secrets.ODDSPORTAL_COOKIES_JSON_B64 }}
        run: |
          if [ -z "$ODDSPORTAL_STORAGE_STATE_B64" ] && [ -z "$ODDSPORTAL_COOKIES_JSON" ] && [ -z "$ODDSPORTAL_COOKIES_JSON_B64" ] && { [ -z "$ODDSPORTAL_USERNAME" ] || [ -z "$ODDSPORTAL_PASSWORD" ]; }; then
            echo "Set ODDSPORTAL_COOKIES_JSON, ODDSPORTAL_COOKIES_JSON_B64, ODDSPORTAL_STORAGE_STATE_B64, or both ODDSPORTAL_USERNAME and ODDSPORTAL_PASSWORD as repository secrets."
            exit 2
          fi
          echo "OddsPortal auth/session secret found."

      - name: Run decoded tournament V3 scraper
        shell: bash
        env:
          ODDSPORTAL_USERNAME: ${{ secrets.ODDSPORTAL_USERNAME }}
          ODDSPORTAL_PASSWORD: ${{ secrets.ODDSPORTAL_PASSWORD }}
          ODDSPORTAL_STORAGE_STATE_B64: ${{ secrets.ODDSPORTAL_STORAGE_STATE_B64 }}
          ODDSPORTAL_COOKIES_JSON: ${{ secrets.ODDSPORTAL_COOKIES_JSON }}
          ODDSPORTAL_COOKIES_JSON_B64: ${{ secrets.ODDSPORTAL_COOKIES_JSON_B64 }}
        run: |
          python -u scripts/oddsportal_decoded_tournament_v3_scraper.py \
            --results-urls-file data/oddsportal_major_results_urls.txt \
            --limit-total '${{ github.event.inputs.limit_total }}' \
            --max-matches-per-results '${{ github.event.inputs.max_matches_per_results }}' \
            --out artifacts/output/oddsportal-decoded-tournament-v3 \
            --wait-ms '${{ github.event.inputs.wait_ms }}' \
            --pause-seconds '${{ github.event.inputs.pause_seconds }}'

      - name: Backtest decoded tournament V3 result
        if: always()
        shell: bash
        run: |
          if [ -f artifacts/output/oddsportal-decoded-tournament-v3/bet365_master_decoded_v3.csv ]; then
            python -u scripts/backtest_bet365_v3_from_csv.py \
              --csv artifacts/output/oddsportal-decoded-tournament-v3/bet365_master_decoded_v3.csv \
              --out artifacts/output/backtest-decoded-tournament-v3 \
              --stake 100
          fi

      - name: Upload safe decoded tournament V3 artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: oddsportal-decoded-tournament-v3-safe
          path: |
            artifacts/output/oddsportal-decoded-tournament-v3/run_summary.json
            artifacts/output/oddsportal-decoded-tournament-v3/discovered_match_urls.csv
            artifacts/output/oddsportal-decoded-tournament-v3/market_urls.json
            artifacts/output/oddsportal-decoded-tournament-v3/bet365_master_decoded_v3.csv
            artifacts/output/backtest-decoded-tournament-v3/backtest_summary.json
            artifacts/output/backtest-decoded-tournament-v3/backtest_trades.csv
          if-no-files-found: warn

name: API Tennis Live First Set Lab Scanner

on:
  workflow_dispatch:
    inputs:
      send_telegram:
        description: Send Telegram messages through Supabase duplicate guard. Use false for dry-run.
        required: false
        default: 'false'
      date_start:
        description: Start date YYYY-MM-DD. Blank = today UTC.
        required: false
        default: ''
      date_stop:
        description: Stop date YYYY-MM-DD. Blank = today+2 UTC.
        required: false
        default: ''
      max_minutes_to_start:
        description: Maximum minutes before match start to scan.
        required: false
        default: '2160'
      min_minutes_to_start:
        description: Minimum minutes before match start. Use 0 for pre-match only.
        required: false
        default: '0'
      event_type_keys:
        description: ATP/WTA event type keys.
        required: false
        default: '265,266'
      core_daily_cap:
        description: Core exact-score edge signals per day cap.
        required: false
        default: '10'
      vip_daily_cap:
        description: VIP exact-score edge signals per day cap.
        required: false
        default: '5'
      core_comfort_daily_cap:
        description: Core comfort signals per day cap.
        required: false
        default: '1'
      vip_comfort_daily_cap:
        description: VIP comfort signals per day cap.
        required: false
        default: '2'
  schedule:
    - cron: '17 */2 * * *'

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Generate live First Set Lab signals
        env:
          API_TENNIS_KEY: ${{ secrets.API_TENNIS_KEY }}
          APITENNIS_API_KEY: ${{ secrets.APITENNIS_API_KEY }}
          API_TENNIS_API_KEY: ${{ secrets.API_TENNIS_API_KEY }}
          API_TENNIS_DATE_START: ${{ github.event.inputs.date_start }}
          API_TENNIS_DATE_STOP: ${{ github.event.inputs.date_stop }}
          API_TENNIS_EVENT_TYPE_KEYS: ${{ github.event.inputs.event_type_keys }}
          MAX_MINUTES_TO_START: ${{ github.event.inputs.max_minutes_to_start }}
          MIN_MINUTES_TO_START: ${{ github.event.inputs.min_minutes_to_start }}
          CORE_DAILY_CAP: ${{ github.event.inputs.core_daily_cap }}
          VIP_DAILY_CAP: ${{ github.event.inputs.vip_daily_cap }}
          CORE_COMFORT_DAILY_CAP: ${{ github.event.inputs.core_comfort_daily_cap }}
          VIP_COMFORT_DAILY_CAP: ${{ github.event.inputs.vip_comfort_daily_cap }}
        shell: bash
        run: |
          ARGS=(
            --out=artifacts/output/api-tennis-live-first-set-lab-scanner
            --send-telegram=false
          )
          if [ -n "${API_TENNIS_DATE_START}" ]; then
            ARGS+=(--date-start="${API_TENNIS_DATE_START}")
          fi
          if [ -n "${API_TENNIS_DATE_STOP}" ]; then
            ARGS+=(--date-stop="${API_TENNIS_DATE_STOP}")
          fi
          if [ -n "${MAX_MINUTES_TO_START}" ]; then
            ARGS+=(--max-minutes-to-start="${MAX_MINUTES_TO_START}")
          fi
          if [ -n "${MIN_MINUTES_TO_START}" ]; then
            ARGS+=(--min-minutes-to-start="${MIN_MINUTES_TO_START}")
          fi
          if [ -n "${CORE_DAILY_CAP}" ]; then
            ARGS+=(--core-daily-cap="${CORE_DAILY_CAP}")
          fi
          if [ -n "${VIP_DAILY_CAP}" ]; then
            ARGS+=(--vip-daily-cap="${VIP_DAILY_CAP}")
          fi
          if [ -n "${CORE_COMFORT_DAILY_CAP}" ]; then
            ARGS+=(--core-comfort-daily-cap="${CORE_COMFORT_DAILY_CAP}")
          fi
          if [ -n "${VIP_COMFORT_DAILY_CAP}" ]; then
            ARGS+=(--vip-comfort-daily-cap="${VIP_COMFORT_DAILY_CAP}")
          fi
          node scripts/api_tennis_live_first_set_lab_scanner.mjs "${ARGS[@]}"

      - name: Deliver through Supabase duplicate guard
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CORE_CHAT_ID: ${{ secrets.TELEGRAM_CORE_CHAT_ID }}
          TELEGRAM_VIP_CHAT_ID: ${{ secrets.TELEGRAM_VIP_CHAT_ID }}
          ENABLE_LIVE_TELEGRAM_SEND: ${{ secrets.ENABLE_LIVE_TELEGRAM_SEND }}
          MANUAL_SEND_TELEGRAM: ${{ github.event.inputs.send_telegram }}
          REQUIRE_SUPABASE_FOR_SEND: 'true'
        shell: bash
        run: |
          if [ "${GITHUB_EVENT_NAME}" = "schedule" ]; then
            if [ "${ENABLE_LIVE_TELEGRAM_SEND}" = "true" ]; then
              EFFECTIVE_SEND_TELEGRAM=true
            else
              EFFECTIVE_SEND_TELEGRAM=false
            fi
          else
            EFFECTIVE_SEND_TELEGRAM="${MANUAL_SEND_TELEGRAM:-false}"
          fi

          echo "Effective Telegram sending: ${EFFECTIVE_SEND_TELEGRAM}"

          node scripts/first_set_lab_supabase_deliver.mjs \
            --input=artifacts/output/api-tennis-live-first-set-lab-scanner/first_set_lab_live_signals.csv \
            --out=artifacts/output/api-tennis-live-first-set-lab-scanner \
            --send-telegram="${EFFECTIVE_SEND_TELEGRAM}" \
            --require-supabase-for-send=true

      - name: Upload live First Set Lab artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: api-tennis-live-first-set-lab-scanner
          path: |
            artifacts/output/api-tennis-live-first-set-lab-scanner/first_set_lab_live_report.md
            artifacts/output/api-tennis-live-first-set-lab-scanner/first_set_lab_live_summary.json
            artifacts/output/api-tennis-live-first-set-lab-scanner/first_set_lab_live_signals.csv
            artifacts/output/api-tennis-live-first-set-lab-scanner/first_set_lab_live_raw_candidates.csv
            artifacts/output/api-tennis-live-first-set-lab-scanner/first_set_lab_live_telegram_log.csv
            artifacts/output/api-tennis-live-first-set-lab-scanner/first_set_lab_live_fatal_error.json
            artifacts/output/api-tennis-live-first-set-lab-scanner/first_set_lab_supabase_delivery_report.md
            artifacts/output/api-tennis-live-first-set-lab-scanner/first_set_lab_supabase_delivery_summary.json
            artifacts/output/api-tennis-live-first-set-lab-scanner/first_set_lab_supabase_delivery_log.csv
            artifacts/output/api-tennis-live-first-set-lab-scanner/first_set_lab_supabase_delivery_fatal_error.json
          if-no-files-found: warn

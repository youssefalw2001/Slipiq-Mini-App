name: OddsPortal Archive Events To V3

on:
  workflow_dispatch:
    inputs:
      limit_pages:
        description: Number of tournament results pages to parse into events.
        required: false
        default: '5'
      start_index:
        description: Start index inside finished archive events.
        required: false
        default: '0'
      limit_total:
        description: Number of finished events to process in this chunk. Use 0 for all.
        required: false
        default: '20'
      wait_ms:
        description: Browser wait between page actions.
        required: false
        default: '4500'
      pause_seconds:
        description: Polite pause between match pages.
        required: false
        default: '1.5'
      include_unfinished:
        description: Include scheduled/unfinished archive rows. Usually false for historical backtest.
        required: false
        default: 'false'
      skip_bet365_filter:
        description: Skip applying OddsPortal bet365 filter. Provider 549 extraction still used.
        required: false
        default: 'false'

jobs:
  archive-events-to-v3:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    env:
      PYTHONUNBUFFERED: '1'

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        shell: bash
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements-oddsportal.txt
          python -m playwright install --with-deps chromium

      - name: Check OddsPortal auth/session secret exists
        shell: bash
        env:
          ODDSPORTAL_USERNAME: ${{ secrets.ODDSPORTAL_USERNAME }}
          ODDSPORTAL_PASSWORD: ${{ secrets.ODDSPORTAL_PASSWORD }}
          ODDSPORTAL_STORAGE_STATE_B64: ${{ secrets.ODDSPORTAL_STORAGE_STATE_B64 }}
          ODDSPORTAL_COOKIES_JSON: ${{ secrets.ODDSPORTAL_COOKIES_JSON }}
          ODDSPORTAL_COOKIES_JSON_B64: ${{ secrets.ODDSPORTAL_COOKIES_JSON_B64 }}
        run: |
          if [ -z "$ODDSPORTAL_STORAGE_STATE_B64" ] && [ -z "$ODDSPORTAL_COOKIES_JSON" ] && [ -z "$ODDSPORTAL_COOKIES_JSON_B64" ] && { [ -z "$ODDSPORTAL_USERNAME" ] || [ -z "$ODDSPORTAL_PASSWORD" ]; }; then
            echo "Set ODDSPORTAL_COOKIES_JSON, ODDSPORTAL_COOKIES_JSON_B64, ODDSPORTAL_STORAGE_STATE_B64, or both ODDSPORTAL_USERNAME and ODDSPORTAL_PASSWORD as repository secrets."
            exit 2
          fi
          echo "OddsPortal auth/session secret found."

      - name: Run archive events to V3 scraper
        shell: bash
        env:
          ODDSPORTAL_USERNAME: ${{ secrets.ODDSPORTAL_USERNAME }}
          ODDSPORTAL_PASSWORD: ${{ secrets.ODDSPORTAL_PASSWORD }}
          ODDSPORTAL_STORAGE_STATE_B64: ${{ secrets.ODDSPORTAL_STORAGE_STATE_B64 }}
          ODDSPORTAL_COOKIES_JSON: ${{ secrets.ODDSPORTAL_COOKIES_JSON }}
          ODDSPORTAL_COOKIES_JSON_B64: ${{ secrets.ODDSPORTAL_COOKIES_JSON_B64 }}
        run: |
          EXTRA_FLAGS=""
          if [ "${{ github.event.inputs.include_unfinished }}" = "true" ]; then
            EXTRA_FLAGS="$EXTRA_FLAGS --include-unfinished"
          fi
          if [ "${{ github.event.inputs.skip_bet365_filter }}" = "true" ]; then
            EXTRA_FLAGS="$EXTRA_FLAGS --skip-bet365-filter"
          fi
          python -u scripts/oddsportal_archive_events_to_v3_scraper.py \
            --results-urls-file data/oddsportal_major_results_urls.txt \
            --out artifacts/output/oddsportal-archive-events-to-v3 \
            --limit-pages '${{ github.event.inputs.limit_pages }}' \
            --start-index '${{ github.event.inputs.start_index }}' \
            --limit-total '${{ github.event.inputs.limit_total }}' \
            --wait-ms '${{ github.event.inputs.wait_ms }}' \
            --pause-seconds '${{ github.event.inputs.pause_seconds }}' \
            $EXTRA_FLAGS

      - name: Backtest archive events V3 result
        if: always()
        shell: bash
        run: |
          if [ -f artifacts/output/oddsportal-archive-events-to-v3/bet365_master_decoded_v3.csv ]; then
            python -u scripts/backtest_bet365_v3_from_csv.py \
              --csv artifacts/output/oddsportal-archive-events-to-v3/bet365_master_decoded_v3.csv \
              --out artifacts/output/backtest-archive-events-v3 \
              --stake 100
          fi

      - name: Upload safe archive events V3 artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: oddsportal-archive-events-to-v3-safe
          path: |
            artifacts/output/oddsportal-archive-events-to-v3/run_summary.json
            artifacts/output/oddsportal-archive-events-to-v3/archive_events_all.csv
            artifacts/output/oddsportal-archive-events-to-v3/archive_events_filtered.csv
            artifacts/output/oddsportal-archive-events-to-v3/bet365_master_decoded_v3.csv
            artifacts/output/backtest-archive-events-v3/backtest_summary.json
            artifacts/output/backtest-archive-events-v3/backtest_trades.csv
          if-no-files-found: warn

name: API Tennis Historical V3 Backfill

on:
  workflow_dispatch:
    inputs:
      preset_range:
        description: Use 15_months for 2025-02-17 through 2026-05-17, or custom for manual dates.
        required: false
        default: 'custom'
        type: choice
        options:
          - custom
          - 15_months
      date_start:
        description: Custom start date YYYY-MM-DD. Ignored when preset_range=15_months.
        required: false
        default: '2026-05-01'
      date_stop:
        description: Custom stop date YYYY-MM-DD. Ignored when preset_range=15_months.
        required: false
        default: '2026-05-07'
      event_type_keys:
        description: Comma-separated event_type_key values. Default 265,266 for ATP/WTA singles.
        required: false
        default: '265,266'
      write_supabase:
        description: Upsert rows into Supabase historical table. Keep false for artifact-only backtests.
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'
      min_grouped:
        description: Minimum grouped P2 9-12 odds.
        required: false
        default: '3.30'
      ideal_grouped:
        description: Ideal grouped P2 9-12 odds.
        required: false
        default: '3.50'
      request_pause_ms:
        description: Pause between API requests to reduce rate-limit risk.
        required: false
        default: '250'

jobs:
  plan:
    runs-on: ubuntu-latest
    outputs:
      chunks: ${{ steps.plan.outputs.chunks }}
      backfill_run_id: ${{ steps.plan.outputs.backfill_run_id }}
    steps:
      - name: Build date chunks
        id: plan
        shell: bash
        run: |
          node - <<'NODE' >> "$GITHUB_OUTPUT"
          const preset = '${{ github.event.inputs.preset_range }}';
          const inputStart = '${{ github.event.inputs.date_start }}';
          const inputStop = '${{ github.event.inputs.date_stop }}';
          const start = preset === '15_months' ? '2025-02-17' : inputStart;
          const stop = preset === '15_months' ? '2026-05-17' : inputStop;
          const runId = `api-tennis-15m-${Date.now()}`;
          const chunks = [];
          let d = new Date(`${start}T00:00:00Z`);
          const end = new Date(`${stop}T00:00:00Z`);
          while (d <= end) {
            const chunkStart = new Date(d);
            const chunkEnd = new Date(d);
            chunkEnd.setUTCDate(chunkEnd.getUTCDate() + 13);
            if (chunkEnd > end) chunkEnd.setTime(end.getTime());
            chunks.push({
              date_start: chunkStart.toISOString().slice(0, 10),
              date_stop: chunkEnd.toISOString().slice(0, 10),
            });
            d = new Date(chunkEnd);
            d.setUTCDate(d.getUTCDate() + 1);
          }
          console.log(`chunks=${JSON.stringify(chunks)}`);
          console.log(`backfill_run_id=${runId}`);
          NODE

  backfill:
    needs: plan
    runs-on: ubuntu-latest
    timeout-minutes: 60
    continue-on-error: true
    strategy:
      fail-fast: false
      max-parallel: 2
      matrix:
        chunk: ${{ fromJson(needs.plan.outputs.chunks) }}

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Check required secrets
        shell: bash
        env:
          API_TENNIS_KEY: ${{ secrets.API_TENNIS_KEY }}
          APITENNIS_API_KEY: ${{ secrets.APITENNIS_API_KEY }}
          API_TENNIS_API_KEY: ${{ secrets.API_TENNIS_API_KEY }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: |
          if [ -z "$API_TENNIS_KEY" ] && [ -z "$APITENNIS_API_KEY" ] && [ -z "$API_TENNIS_API_KEY" ]; then
            echo "Missing API Tennis key."
            exit 2
          fi
          if [ '${{ github.event.inputs.write_supabase }}' = 'true' ]; then
            if [ -z "$SUPABASE_URL" ] || { [ -z "$SUPABASE_SERVICE_ROLE_KEY" ] && [ -z "$SUPABASE_SERVICE_KEY" ]; }; then
              echo "Supabase write requested but Supabase secrets are missing."
              exit 2
            fi
          fi

      - name: Run historical backfill chunk
        shell: bash
        env:
          API_TENNIS_KEY: ${{ secrets.API_TENNIS_KEY }}
          APITENNIS_API_KEY: ${{ secrets.APITENNIS_API_KEY }}
          API_TENNIS_API_KEY: ${{ secrets.API_TENNIS_API_KEY }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          OUT_DIR: artifacts/output/api-tennis-historical-v3-backfill/${{ matrix.chunk.date_start }}_${{ matrix.chunk.date_stop }}
        run: |
          node scripts/api_tennis_historical_v3_backfill.mjs \
            --out="artifacts/output/api-tennis-historical-v3-backfill/${{ matrix.chunk.date_start }}_${{ matrix.chunk.date_stop }}" \
            --date-start='${{ matrix.chunk.date_start }}' \
            --date-stop='${{ matrix.chunk.date_stop }}' \
            --event-type-keys='${{ github.event.inputs.event_type_keys }}' \
            --write-supabase='${{ github.event.inputs.write_supabase }}' \
            --min-grouped='${{ github.event.inputs.min_grouped }}' \
            --ideal-grouped='${{ github.event.inputs.ideal_grouped }}' \
            --request-pause-ms='${{ github.event.inputs.request_pause_ms }}' \
            --backfill-run-id='${{ needs.plan.outputs.backfill_run_id }}'

      - name: Upload chunk artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: api-tennis-historical-v3-backfill-${{ matrix.chunk.date_start }}-${{ matrix.chunk.date_stop }}
          path: |
            artifacts/output/api-tennis-historical-v3-backfill/${{ matrix.chunk.date_start }}_${{ matrix.chunk.date_stop }}/run_summary.json
            artifacts/output/api-tennis-historical-v3-backfill/${{ matrix.chunk.date_start }}_${{ matrix.chunk.date_stop }}/api_tennis_historical_v3_backfill_rows.csv
            artifacts/output/api-tennis-historical-v3-backfill/${{ matrix.chunk.date_start }}_${{ matrix.chunk.date_stop }}/api_tennis_historical_v3_backfill_report.md
          if-no-files-found: warn

  combine:
    needs: [plan, backfill]
    if: always()
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Download all chunk artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: api-tennis-historical-v3-backfill-*
          path: downloaded-artifacts
          merge-multiple: false

      - name: Combine chunk CSVs and summaries
        shell: bash
        run: |
          mkdir -p combined-output
          node - <<'NODE'
          const fs = require('fs');
          const path = require('path');
          const root = 'downloaded-artifacts';
          const outDir = 'combined-output';
          const csvName = 'api_tennis_historical_v3_backfill_rows.csv';
          const summaryName = 'run_summary.json';
          const rowsOut = path.join(outDir, 'api_tennis_15m_historical_v3_rows_combined.csv');
          const summariesOut = path.join(outDir, 'api_tennis_15m_backfill_summaries.json');
          const reportOut = path.join(outDir, 'api_tennis_15m_backfill_combined_report.md');
          const dirs = fs.existsSync(root) ? fs.readdirSync(root).map((d) => path.join(root, d)).filter((p) => fs.statSync(p).isDirectory()).sort() : [];
          let header = null;
          let rowCount = 0;
          let chunksWithCsv = 0;
          const summaries = [];
          fs.writeFileSync(rowsOut, '');
          for (const dir of dirs) {
            const csvPath = path.join(dir, csvName);
            const summaryPath = path.join(dir, summaryName);
            if (fs.existsSync(summaryPath)) {
              try { summaries.push(JSON.parse(fs.readFileSync(summaryPath, 'utf8'))); } catch (e) { summaries.push({ artifact: dir, summary_parse_error: String(e) }); }
            }
            if (!fs.existsSync(csvPath)) continue;
            const lines = fs.readFileSync(csvPath, 'utf8').split(/\r?\n/).filter(Boolean);
            if (!lines.length) continue;
            chunksWithCsv += 1;
            if (!header) {
              header = lines[0];
              fs.appendFileSync(rowsOut, header + '\n');
            }
            const body = lines.slice(1);
            rowCount += body.length;
            if (body.length) fs.appendFileSync(rowsOut, body.join('\n') + '\n');
          }
          fs.writeFileSync(summariesOut, JSON.stringify(summaries, null, 2));
          const totals = summaries.reduce((acc, s) => {
            for (const key of ['rows_extracted','rows_upserted','rows_with_first_set_score','p2_grouped_330_plus','p2_grouped_350_plus','strict_v3_rows','settled_wins','settled_losses']) {
              acc[key] = (acc[key] || 0) + (Number(s[key]) || 0);
            }
            if (Array.isArray(s.errors)) acc.errors += s.errors.length;
            return acc;
          }, { errors: 0 });
          const settled = (totals.settled_wins || 0) + (totals.settled_losses || 0);
          const hitRate = settled ? (totals.settled_wins / settled).toFixed(6) : 'n/a';
          const md = [
            '# API Tennis 15-Month Historical V3 Combined Backfill',
            '',
            `Combined artifact generated: ${new Date().toISOString()}`,
            `Backfill run id: ${{ needs.plan.outputs.backfill_run_id }}`,
            `Chunk artifacts found: ${dirs.length}`,
            `Chunks with CSV: ${chunksWithCsv}`,
            `Combined CSV rows: ${rowCount}`,
            '',
            '## Totals from chunk summaries',
            `Rows extracted: ${totals.rows_extracted || 0}`,
            `Rows upserted: ${totals.rows_upserted || 0}`,
            `Rows with first-set score: ${totals.rows_with_first_set_score || 0}`,
            `P2 grouped >= 3.30: ${totals.p2_grouped_330_plus || 0}`,
            `P2 grouped >= 3.50: ${totals.p2_grouped_350_plus || 0}`,
            `Strict V3 rows: ${totals.strict_v3_rows || 0}`,
            `Settled wins/losses: ${totals.settled_wins || 0}/${totals.settled_losses || 0}`,
            `Settled hit rate: ${hitRate}`,
            `Chunk-level error count: ${totals.errors || 0}`,
            '',
            'Next step: upload this combined artifact for optimizer/backtest analysis.',
            '',
          ];
          fs.writeFileSync(reportOut, md.join('\n'));
          NODE

      - name: Upload combined 15-month artifact
        uses: actions/upload-artifact@v4
        with:
          name: api-tennis-15m-historical-v3-combined
          path: |
            combined-output/api_tennis_15m_historical_v3_rows_combined.csv
            combined-output/api_tennis_15m_backfill_summaries.json
            combined-output/api_tennis_15m_backfill_combined_report.md
          if-no-files-found: error

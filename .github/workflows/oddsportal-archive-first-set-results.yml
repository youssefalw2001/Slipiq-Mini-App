name: OddsPortal Archive First Set Results

on:
  workflow_dispatch:
    inputs:
      limit_pages:
        description: Number of tournament result pages to inspect.
        required: false
        default: '25'
      wait_ms:
        description: Browser wait between page actions.
        required: false
        default: '3000'

jobs:
  archive-first-set-results:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    env:
      PYTHONUNBUFFERED: '1'

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        shell: bash
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements-oddsportal.txt
          python -m playwright install --with-deps chromium

      - name: Build archive first-set results CSV
        shell: bash
        run: |
          python -u scripts/oddsportal_archive_first_set_results_builder.py \
            --results-urls-file data/oddsportal_major_results_urls.txt \
            --out artifacts/output/oddsportal-archive-first-set-results \
            --limit-pages '${{ github.event.inputs.limit_pages }}' \
            --wait-ms '${{ github.event.inputs.wait_ms }}'

      - name: Upload safe first-set results artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: oddsportal-archive-first-set-results-safe
          path: |
            artifacts/output/oddsportal-archive-first-set-results/run_summary.json
            artifacts/output/oddsportal-archive-first-set-results/first_set_results_report.md
            artifacts/output/oddsportal-archive-first-set-results/archive_results_endpoint_inventory.csv
            artifacts/output/oddsportal-archive-first-set-results/first_set_results.csv
          if-no-files-found: warn

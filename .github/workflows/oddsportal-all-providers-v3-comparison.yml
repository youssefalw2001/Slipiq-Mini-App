name: OddsPortal All Providers V3 Comparison

on:
  workflow_dispatch:
    inputs:
      start_index:
        description: Start index in data/first_set_results_master.csv.
        required: false
        default: '0'
      limit_total:
        description: Number of master rows to test. Use 25 for smoke, 100+ after validation.
        required: false
        default: '25'
      wait_ms:
        description: Browser wait for token discovery.
        required: false
        default: '3500'
      pause_seconds:
        description: Pause between endpoint requests.
        required: false
        default: '0.25'
      token_max_events:
        description: Master rows to try for token discovery after proof URLs.
        required: false
        default: '8'
      min_provider_rows:
        description: Minimum provider coverage rows required in provider summary.
        required: false
        default: '5'

jobs:
  all-providers-v3:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    env:
      PYTHONUNBUFFERED: '1'

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        shell: bash
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements-oddsportal.txt
          python -m playwright install --with-deps chromium

      - name: Check OddsPortal auth/session secret exists
        shell: bash
        env:
          ODDSPORTAL_USERNAME: ${{ secrets.ODDSPORTAL_USERNAME }}
          ODDSPORTAL_PASSWORD: ${{ secrets.ODDSPORTAL_PASSWORD }}
          ODDSPORTAL_STORAGE_STATE_B64: ${{ secrets.ODDSPORTAL_STORAGE_STATE_B64 }}
          ODDSPORTAL_COOKIES_JSON: ${{ secrets.ODDSPORTAL_COOKIES_JSON }}
          ODDSPORTAL_COOKIES_JSON_B64: ${{ secrets.ODDSPORTAL_COOKIES_JSON_B64 }}
        run: |
          if [ -z "$ODDSPORTAL_STORAGE_STATE_B64" ] && [ -z "$ODDSPORTAL_COOKIES_JSON" ] && [ -z "$ODDSPORTAL_COOKIES_JSON_B64" ] && { [ -z "$ODDSPORTAL_USERNAME" ] || [ -z "$ODDSPORTAL_PASSWORD" ]; }; then
            echo "Set an OddsPortal cookie/storage secret or username/password repository secrets."
            exit 2
          fi
          echo "OddsPortal auth/session secret found."

      - name: Validate master CSV before running
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path
          import csv, sys
          p = Path('data/first_set_results_master.csv')
          if not p.exists():
              sys.exit('FAIL: master CSV missing')
          if p.stat().st_size < 10000:
              sys.exit(f'FAIL: master CSV too small: {p.stat().st_size} bytes')
          rows = list(csv.DictReader(p.open(newline='', encoding='utf-8')))
          required = {'event_id','event_hash','player1','player2','match_url','partialresult','first_set_score','result_status'}
          missing = required - set(rows[0].keys() if rows else [])
          if missing:
              sys.exit(f'FAIL: missing columns: {missing}')
          if len(rows) < 100:
              sys.exit(f'FAIL: too few rows: {len(rows)}')
          ok = sum(1 for r in rows if r.get('result_status') == 'ok' and r.get('first_set_score'))
          if ok < len(rows) * 0.80:
              sys.exit(f'FAIL: too few valid result rows: {ok}/{len(rows)}')
          print(f'PASS: {len(rows)} rows, {ok} valid')
          PY

      - name: Run all-provider V3 comparison
        shell: bash
        env:
          ODDSPORTAL_USERNAME: ${{ secrets.ODDSPORTAL_USERNAME }}
          ODDSPORTAL_PASSWORD: ${{ secrets.ODDSPORTAL_PASSWORD }}
          ODDSPORTAL_STORAGE_STATE_B64: ${{ secrets.ODDSPORTAL_STORAGE_STATE_B64 }}
          ODDSPORTAL_COOKIES_JSON: ${{ secrets.ODDSPORTAL_COOKIES_JSON }}
          ODDSPORTAL_COOKIES_JSON_B64: ${{ secrets.ODDSPORTAL_COOKIES_JSON_B64 }}
        run: |
          python -u scripts/oddsportal_all_providers_v3_from_master_csv.py \
            --master data/first_set_results_master.csv \
            --out artifacts/output/oddsportal-all-providers-v3 \
            --start-index '${{ github.event.inputs.start_index }}' \
            --limit-total '${{ github.event.inputs.limit_total }}' \
            --wait-ms '${{ github.event.inputs.wait_ms }}' \
            --pause-seconds '${{ github.event.inputs.pause_seconds }}' \
            --token-max-events '${{ github.event.inputs.token_max_events }}' \
            --min-provider-rows '${{ github.event.inputs.min_provider_rows }}'

      - name: Upload all-provider comparison artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: oddsportal-all-providers-v3
          path: |
            artifacts/output/oddsportal-all-providers-v3/run_summary.json
            artifacts/output/oddsportal-all-providers-v3/v3_all_providers_long.csv
            artifacts/output/oddsportal-all-providers-v3/v3_best_provider_per_match.csv
            artifacts/output/oddsportal-all-providers-v3/v3_best_line_per_match.csv
            artifacts/output/oddsportal-all-providers-v3/v3_provider_summary.csv
            artifacts/output/oddsportal-all-providers-v3/v3_all_providers_report.md
          if-no-files-found: warn

name: OddsPortal Archive Score Field Probe

on:
  workflow_dispatch:
    inputs:
      limit_pages:
        description: Number of tournament result pages to inspect.
        required: false
        default: '10'
      wait_ms:
        description: Browser wait between page actions.
        required: false
        default: '3000'

jobs:
  archive-score-field-probe:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    env:
      PYTHONUNBUFFERED: '1'

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        shell: bash
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements-oddsportal.txt
          python -m playwright install --with-deps chromium

      - name: Run archive score field probe
        shell: bash
        run: |
          python -u scripts/oddsportal_archive_score_field_probe.py \
            --results-urls-file data/oddsportal_major_results_urls.txt \
            --out artifacts/output/oddsportal-archive-score-field-probe \
            --limit-pages '${{ github.event.inputs.limit_pages }}' \
            --wait-ms '${{ github.event.inputs.wait_ms }}'

      - name: Upload safe score field probe artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: oddsportal-archive-score-field-probe-safe
          path: |
            artifacts/output/oddsportal-archive-score-field-probe/run_summary.json
            artifacts/output/oddsportal-archive-score-field-probe/score_field_report.md
            artifacts/output/oddsportal-archive-score-field-probe/archive_score_endpoint_inventory.csv
            artifacts/output/oddsportal-archive-score-field-probe/archive_first_set_score_candidates.csv
            artifacts/output/oddsportal-archive-score-field-probe/decoded_archive_bodies/**
          if-no-files-found: warn

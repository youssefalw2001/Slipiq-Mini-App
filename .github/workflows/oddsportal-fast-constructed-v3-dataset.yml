name: OddsPortal V3 Odds From Master CSV

on:
  workflow_dispatch:
    inputs:
      start_index:
        description: Start index inside data/first_set_results_master.csv.
        required: false
        default: '0'
      limit_total:
        description: Number of master result rows to fetch V3 odds for. Use 0 for all.
        required: false
        default: '100'
      wait_ms:
        description: Browser wait while discovering session token.
        required: false
        default: '2500'
      pause_seconds:
        description: Pause between constructed endpoint requests.
        required: false
        default: '0.15'
      token_max_events:
        description: Number of master rows to try while discovering the session token.
        required: false
        default: '8'

jobs:
  v3-odds-from-master:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    env:
      PYTHONUNBUFFERED: '1'

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        shell: bash
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements-oddsportal.txt
          python -m playwright install --with-deps chromium

      - name: Check master CSV exists
        shell: bash
        run: |
          if [ ! -s data/first_set_results_master.csv ]; then
            echo "data/first_set_results_master.csv is missing or empty. Run 'OddsPortal Build First Set Results Master' first."
            exit 2
          fi
          echo "Master CSV row count:"
          wc -l data/first_set_results_master.csv

      - name: Check OddsPortal auth/session secret exists
        shell: bash
        env:
          ODDSPORTAL_USERNAME: ${{ secrets.ODDSPORTAL_USERNAME }}
          ODDSPORTAL_PASSWORD: ${{ secrets.ODDSPORTAL_PASSWORD }}
          ODDSPORTAL_STORAGE_STATE_B64: ${{ secrets.ODDSPORTAL_STORAGE_STATE_B64 }}
          ODDSPORTAL_COOKIES_JSON: ${{ secrets.ODDSPORTAL_COOKIES_JSON }}
          ODDSPORTAL_COOKIES_JSON_B64: ${{ secrets.ODDSPORTAL_COOKIES_JSON_B64 }}
        run: |
          if [ -z "$ODDSPORTAL_STORAGE_STATE_B64" ] && [ -z "$ODDSPORTAL_COOKIES_JSON" ] && [ -z "$ODDSPORTAL_COOKIES_JSON_B64" ] && { [ -z "$ODDSPORTAL_USERNAME" ] || [ -z "$ODDSPORTAL_PASSWORD" ]; }; then
            echo "Set an OddsPortal cookie/storage secret or username/password repository secrets."
            exit 2
          fi
          echo "OddsPortal auth/session secret found."

      - name: Fetch V3 odds from master CSV
        shell: bash
        env:
          ODDSPORTAL_USERNAME: ${{ secrets.ODDSPORTAL_USERNAME }}
          ODDSPORTAL_PASSWORD: ${{ secrets.ODDSPORTAL_PASSWORD }}
          ODDSPORTAL_STORAGE_STATE_B64: ${{ secrets.ODDSPORTAL_STORAGE_STATE_B64 }}
          ODDSPORTAL_COOKIES_JSON: ${{ secrets.ODDSPORTAL_COOKIES_JSON }}
          ODDSPORTAL_COOKIES_JSON_B64: ${{ secrets.ODDSPORTAL_COOKIES_JSON_B64 }}
        run: |
          python -u scripts/oddsportal_v3_odds_from_master_csv.py \
            --master-results-csv data/first_set_results_master.csv \
            --out artifacts/output/oddsportal-v3-odds-from-master \
            --start-index '${{ github.event.inputs.start_index }}' \
            --limit-total '${{ github.event.inputs.limit_total }}' \
            --wait-ms '${{ github.event.inputs.wait_ms }}' \
            --pause-seconds '${{ github.event.inputs.pause_seconds }}' \
            --token-max-events '${{ github.event.inputs.token_max_events }}'

      - name: Upload V3 odds artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: oddsportal-v3-odds-from-master-safe
          path: |
            artifacts/output/oddsportal-v3-odds-from-master/run_summary.json
            artifacts/output/oddsportal-v3-odds-from-master/dataset_summary.json
            artifacts/output/oddsportal-v3-odds-from-master/v3_odds_from_master_report.md
            artifacts/output/oddsportal-v3-odds-from-master/v3_odds_from_master.csv
          if-no-files-found: warn

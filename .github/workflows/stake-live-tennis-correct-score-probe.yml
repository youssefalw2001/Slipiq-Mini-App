name: Stake Live Tennis Correct Score Probe

on:
  workflow_dispatch:
    inputs:
      first:
        description: Number of Stake tennis events to request.
        required: false
        default: '100'
      sport_slug:
        description: Stake sport slug.
        required: false
        default: 'tennis'
      supabase_signal_limit:
        description: Latest Supabase signals to try matching against Stake events.
        required: false
        default: '10'
      scanner_run_id:
        description: Optional scanner_run_id to restrict Supabase signals.
        required: false
        default: ''

jobs:
  stake-live-tennis-probe:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    env:
      PYTHONUNBUFFERED: '1'

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        shell: bash
        run: |
          python -m pip install --upgrade pip
          python -m pip install aiohttp

      - name: Check optional Stake/Supabase secrets
        shell: bash
        env:
          STAKE_ACCESS_TOKEN: ${{ secrets.STAKE_ACCESS_TOKEN }}
          STAKE_SESSION_COOKIE: ${{ secrets.STAKE_SESSION_COOKIE }}
          STAKE_CF_CLEARANCE: ${{ secrets.STAKE_CF_CLEARANCE }}
          STAKE_USER_AGENT: ${{ secrets.STAKE_USER_AGENT }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: |
          if [ -z "$STAKE_ACCESS_TOKEN" ] && [ -z "$STAKE_SESSION_COOKIE" ]; then
            echo "No Stake auth secrets found. The probe will try public GraphQL access only."
          else
            echo "Stake auth secret found."
          fi
          if [ -z "$SUPABASE_URL" ] || { [ -z "$SUPABASE_SERVICE_ROLE_KEY" ] && [ -z "$SUPABASE_SERVICE_KEY" ]; }; then
            echo "Supabase secrets missing. The probe will skip signal matching."
          else
            echo "Supabase secrets found."
          fi

      - name: Run Stake live tennis probe
        shell: bash
        env:
          STAKE_ACCESS_TOKEN: ${{ secrets.STAKE_ACCESS_TOKEN }}
          STAKE_SESSION_COOKIE: ${{ secrets.STAKE_SESSION_COOKIE }}
          STAKE_CF_CLEARANCE: ${{ secrets.STAKE_CF_CLEARANCE }}
          STAKE_USER_AGENT: ${{ secrets.STAKE_USER_AGENT }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: |
          python -u scripts/stake_live_tennis_correct_score_probe.py \
            --out artifacts/output/stake-live-tennis-correct-score \
            --first '${{ github.event.inputs.first }}' \
            --sport-slug '${{ github.event.inputs.sport_slug }}' \
            --supabase-signal-limit '${{ github.event.inputs.supabase_signal_limit }}' \
            --scanner-run-id '${{ github.event.inputs.scanner_run_id }}'

      - name: Upload Stake live tennis artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: stake-live-tennis-correct-score
          path: |
            artifacts/output/stake-live-tennis-correct-score/run_summary.json
            artifacts/output/stake-live-tennis-correct-score/stake_live_market_inventory.csv
            artifacts/output/stake-live-tennis-correct-score/stake_first_set_correct_score_rows.csv
            artifacts/output/stake-live-tennis-correct-score/stake_signal_matches.csv
            artifacts/output/stake-live-tennis-correct-score/stake_live_tennis_report.md
            artifacts/output/stake-live-tennis-correct-score/stake_events_raw.json
          if-no-files-found: warn

name: OddsPortal Fast V3 Odds Only

on:
  workflow_dispatch:
    inputs:
      limit_pages:
        description: Number of tournament result pages to parse into events.
        required: false
        default: '25'
      start_index:
        description: Start index inside finished archive events.
        required: false
        default: '0'
      limit_total:
        description: Number of finished events to fetch V3 odds for.
        required: false
        default: '100'
      wait_ms:
        description: Browser wait while discovering session token.
        required: false
        default: '2500'
      pause_seconds:
        description: Pause between constructed endpoint requests.
        required: false
        default: '0.15'

jobs:
  fast-v3-odds-only:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    env:
      PYTHONUNBUFFERED: '1'

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        shell: bash
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements-oddsportal.txt
          python -m playwright install --with-deps chromium

      - name: Check OddsPortal auth/session secret exists
        shell: bash
        env:
          ODDSPORTAL_USERNAME: ${{ secrets.ODDSPORTAL_USERNAME }}
          ODDSPORTAL_PASSWORD: ${{ secrets.ODDSPORTAL_PASSWORD }}
          ODDSPORTAL_STORAGE_STATE_B64: ${{ secrets.ODDSPORTAL_STORAGE_STATE_B64 }}
          ODDSPORTAL_COOKIES_JSON: ${{ secrets.ODDSPORTAL_COOKIES_JSON }}
          ODDSPORTAL_COOKIES_JSON_B64: ${{ secrets.ODDSPORTAL_COOKIES_JSON_B64 }}
        run: |
          if [ -z "$ODDSPORTAL_STORAGE_STATE_B64" ] && [ -z "$ODDSPORTAL_COOKIES_JSON" ] && [ -z "$ODDSPORTAL_COOKIES_JSON_B64" ] && { [ -z "$ODDSPORTAL_USERNAME" ] || [ -z "$ODDSPORTAL_PASSWORD" ]; }; then
            echo "Set an OddsPortal cookie/storage secret or username/password repository secrets."
            exit 2
          fi
          echo "OddsPortal auth/session secret found."

      - name: Build fast V3 odds-only CSV
        shell: bash
        env:
          ODDSPORTAL_USERNAME: ${{ secrets.ODDSPORTAL_USERNAME }}
          ODDSPORTAL_PASSWORD: ${{ secrets.ODDSPORTAL_PASSWORD }}
          ODDSPORTAL_STORAGE_STATE_B64: ${{ secrets.ODDSPORTAL_STORAGE_STATE_B64 }}
          ODDSPORTAL_COOKIES_JSON: ${{ secrets.ODDSPORTAL_COOKIES_JSON }}
          ODDSPORTAL_COOKIES_JSON_B64: ${{ secrets.ODDSPORTAL_COOKIES_JSON_B64 }}
        run: |
          python -u scripts/oddsportal_constructed_v3_endpoint_probe.py \
            --results-urls-file data/oddsportal_major_results_urls.txt \
            --out artifacts/output/oddsportal-fast-v3-odds-only \
            --limit-pages '${{ github.event.inputs.limit_pages }}' \
            --start-index '${{ github.event.inputs.start_index }}' \
            --limit-total '${{ github.event.inputs.limit_total }}' \
            --wait-ms '${{ github.event.inputs.wait_ms }}' \
            --pause-seconds '${{ github.event.inputs.pause_seconds }}'

      - name: Upload safe fast V3 odds artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: oddsportal-fast-v3-odds-only-safe
          path: |
            artifacts/output/oddsportal-fast-v3-odds-only/run_summary.json
            artifacts/output/oddsportal-fast-v3-odds-only/constructed_v3_endpoint_probe_report.md
            artifacts/output/oddsportal-fast-v3-odds-only/constructed_v3_endpoint_probe.csv
            artifacts/output/oddsportal-fast-v3-odds-only/archive_events_all.csv
            artifacts/output/oddsportal-fast-v3-odds-only/archive_events_filtered.csv
          if-no-files-found: warn

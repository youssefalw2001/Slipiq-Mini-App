name: RapidAPI 1xBet API Probe

on:
  workflow_dispatch:
    inputs:
      mode:
        description: Label for this run.
        required: false
        default: rapidapi-1xbet-match-market-periods
      rapidapi_host:
        description: Copy x-rapidapi-host from the RapidAPI code snippet. Do not include https://.
        required: true
        default: 1xbet-api.p.rapidapi.com
      endpoint:
        description: Copy endpoint path from the RapidAPI URL, for example /sports or /matches.
        required: true
        default: /matches/720919071/markets/periods
      params:
        description: Query params as JSON or key=value&key2=value2. Do not include any API key.
        required: false
        default: '{"mode":"line","lng":"en"}'
      bookmaker:
        description: Target bookmaker name to search for in the response.
        required: false
        default: '1xBet'
      grouped_threshold:
        description: Minimum grouped V3 odds for actionable WATCH candidates.
        required: false
        default: '3.3'
      max_requests:
        description: Keep this small on free plan. Use 1 for first tests.
        required: false
        default: '1'

jobs:
  probe:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Refuse unsafe inputs
        shell: bash
        run: |
          set -e
          INPUTS='${{ github.event.inputs.params }} ${{ github.event.inputs.rapidapi_host }} ${{ github.event.inputs.endpoint }}'
          if echo "$INPUTS" | grep -Eiq 'rapidapi-key|x-rapidapi-key|msh'; then
            echo "Do not paste API keys into workflow inputs. Store the key only as the RAPIDAPI_KEY GitHub secret."
            exit 2
          fi
          if [ -z '${{ github.event.inputs.rapidapi_host }}' ] || [ -z '${{ github.event.inputs.endpoint }}' ]; then
            echo "Missing rapidapi_host or endpoint. Copy them from the RapidAPI code snippet."
            exit 2
          fi

      - name: Run 1xBet RapidAPI probe
        shell: bash
        env:
          RAPIDAPI_KEY: ${{ secrets.RAPIDAPI_KEY }}
        run: |
          set -e
          node scripts/rapidapi-oddsfeed-probe.mjs \
            --mode='${{ github.event.inputs.mode }}' \
            --host='${{ github.event.inputs.rapidapi_host }}' \
            --endpoint='${{ github.event.inputs.endpoint }}' \
            --params='${{ github.event.inputs.params }}' \
            --bookmaker='${{ github.event.inputs.bookmaker }}' \
            --max-requests='${{ github.event.inputs.max_requests }}' \
            --out=artifacts/output/rapidapi-1xbet-api-probe

      - name: Normalize output into SlipIQ V3 summary if possible
        if: always()
        shell: bash
        run: |
          set -e
          if [ -f artifacts/output/rapidapi-1xbet-api-probe/normalized_candidate_odds.csv ]; then
            node scripts/normalize-rapidapi-v3-summary.mjs \
              --input=artifacts/output/rapidapi-1xbet-api-probe \
              --bookmaker='${{ github.event.inputs.bookmaker }}' \
              --threshold='${{ github.event.inputs.grouped_threshold }}'
          else
            echo "normalized_candidate_odds.csv was not created; skipping V3 normalization."
          fi

      - name: Upload 1xBet RapidAPI probe artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: rapidapi-1xbet-api-probe-${{ github.event.inputs.mode }}
          path: artifacts/output/rapidapi-1xbet-api-probe/**
          if-no-files-found: warn

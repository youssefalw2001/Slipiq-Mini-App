name: Blind Strategy Simulation

# Runs a frozen historical blind simulation for SlipIQ strategy validation.
# It generates V3 row CSVs across sequential windows, then applies fixed
# strategy rules day by day without tuning after results are known.
#
# Use the artifact to audit whether SetFox Strict, Grass Lab Candidate,
# Safer, Balanced, and Moonshot profiles show stable historical performance.

on:
  workflow_dispatch:
    inputs:
      start_date:
        description: Simulation start date (YYYY-MM-DD)
        required: true
        default: "2025-05-01"
      end_date:
        description: Simulation end date (YYYY-MM-DD)
        required: true
        default: "2026-05-06"
      window_days:
        description: Days per generated simulation window
        required: true
        default: "30"
      chunk_days:
        description: Days per API request chunk
        required: true
        default: "3"
      model_mode:
        description: Model mode to simulate: independent, coupled, or both
        required: true
        default: "independent"
      block_tiebreak:
        description: Block tiebreak scores in source rows (1/0)
        required: true
        default: "1"
      include_doubles:
        description: Include doubles matches (1/0)
        required: true
        default: "0"
      max_plays_per_day:
        description: Max plays per strategy per day
        required: true
        default: "5"
      stake_units:
        description: Flat stake units per play
        required: true
        default: "1"

jobs:
  blind-strategy-sim:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Verify API key
        shell: bash
        run: |
          if [ -z "$API_TENNIS_KEY" ]; then
            echo "Missing required GitHub secret: API_TENNIS_KEY"
            exit 1
          fi
        env:
          API_TENNIS_KEY: ${{ secrets.API_TENNIS_KEY }}

      - name: Build historical windows
        id: windows
        shell: bash
        run: |
          node <<'NODE' > /tmp/windows.txt
          const start = new Date(`${process.env.START_DATE}T00:00:00Z`);
          const end = new Date(`${process.env.END_DATE}T00:00:00Z`);
          const windowDays = Number(process.env.WINDOW_DAYS || 30);
          if (!Number.isFinite(windowDays) || windowDays <= 0) throw new Error('window_days must be positive');
          const addDays = (date, days) => {
            const next = new Date(date);
            next.setUTCDate(next.getUTCDate() + days);
            return next;
          };
          const fmt = (date) => date.toISOString().slice(0, 10);
          let cursor = start;
          let i = 1;
          while (cursor <= end) {
            const stop = addDays(cursor, windowDays - 1);
            const capped = stop > end ? end : stop;
            console.log(`${i},${fmt(cursor)},${fmt(capped)}`);
            cursor = addDays(capped, 1);
            i += 1;
          }
          NODE
          cat /tmp/windows.txt
          echo "windows_file=/tmp/windows.txt" >> "$GITHUB_OUTPUT"
        env:
          START_DATE: ${{ inputs.start_date }}
          END_DATE: ${{ inputs.end_date }}
          WINDOW_DAYS: ${{ inputs.window_days }}

      - name: Generate V3 rows (independent)
        if: ${{ inputs.model_mode == 'independent' || inputs.model_mode == 'both' }}
        shell: bash
        run: |
          set -e
          while IFS=, read -r i start stop; do
            echo "Independent blind window $i: $start to $stop"
            BACKTEST_WINDOW_ID="blind-${i}-independent" \
            BACKTEST_DATE_START="$start" \
            BACKTEST_DATE_STOP="$stop" \
            BACKTEST_CHUNK_DAYS="${{ inputs.chunk_days }}" \
            BACKTEST_MODEL_MODE="independent" \
            BACKTEST_BLOCK_TIEBREAK="${{ inputs.block_tiebreak }}" \
            BACKTEST_INCLUDE_DOUBLES="${{ inputs.include_doubles }}" \
            BACKTEST_OUTPUT_DIR="artifacts/blind-strategy-sim/source/independent" \
            node scripts/backtest-first-set-lab-v3.mjs
          done < /tmp/windows.txt
        env:
          API_TENNIS_KEY: ${{ secrets.API_TENNIS_KEY }}

      - name: Generate V3 rows (coupled)
        if: ${{ inputs.model_mode == 'coupled' || inputs.model_mode == 'both' }}
        shell: bash
        run: |
          set -e
          while IFS=, read -r i start stop; do
            echo "Coupled blind window $i: $start to $stop"
            BACKTEST_WINDOW_ID="blind-${i}-coupled" \
            BACKTEST_DATE_START="$start" \
            BACKTEST_DATE_STOP="$stop" \
            BACKTEST_CHUNK_DAYS="${{ inputs.chunk_days }}" \
            BACKTEST_MODEL_MODE="coupled" \
            BACKTEST_BLOCK_TIEBREAK="${{ inputs.block_tiebreak }}" \
            BACKTEST_INCLUDE_DOUBLES="${{ inputs.include_doubles }}" \
            BACKTEST_OUTPUT_DIR="artifacts/blind-strategy-sim/source/coupled" \
            node scripts/backtest-first-set-lab-v3.mjs
          done < /tmp/windows.txt
        env:
          API_TENNIS_KEY: ${{ secrets.API_TENNIS_KEY }}

      - name: Run blind simulation (independent)
        if: ${{ inputs.model_mode == 'independent' || inputs.model_mode == 'both' }}
        shell: bash
        run: |
          CSVS=$(ls artifacts/blind-strategy-sim/source/independent/first-set-lab-v3-rows-blind-*-independent.csv | sort | paste -sd ',' -)
          echo "Independent CSVs: $CSVS"
          BLIND_SIM_CSVS="$CSVS" \
          BLIND_SIM_OUTPUT_DIR="artifacts/blind-strategy-sim/results/independent" \
          BLIND_SIM_MODEL_MODE="independent" \
          BLIND_SIM_MAX_PLAYS_PER_DAY="${{ inputs.max_plays_per_day }}" \
          BLIND_SIM_STAKE_UNITS="${{ inputs.stake_units }}" \
          node scripts/blind-strategy-sim.mjs

      - name: Run blind simulation (coupled)
        if: ${{ inputs.model_mode == 'coupled' || inputs.model_mode == 'both' }}
        shell: bash
        run: |
          CSVS=$(ls artifacts/blind-strategy-sim/source/coupled/first-set-lab-v3-rows-blind-*-coupled.csv | sort | paste -sd ',' -)
          echo "Coupled CSVs: $CSVS"
          BLIND_SIM_CSVS="$CSVS" \
          BLIND_SIM_OUTPUT_DIR="artifacts/blind-strategy-sim/results/coupled" \
          BLIND_SIM_MODEL_MODE="coupled" \
          BLIND_SIM_MAX_PLAYS_PER_DAY="${{ inputs.max_plays_per_day }}" \
          BLIND_SIM_STAKE_UNITS="${{ inputs.stake_units }}" \
          node scripts/blind-strategy-sim.mjs

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: blind-strategy-simulation
          path: artifacts/blind-strategy-sim

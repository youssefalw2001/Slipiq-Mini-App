name: OddsPortal Direct Match Event Probe

on:
  workflow_dispatch:
    inputs:
      limit_pages:
        description: Number of tournament result pages to parse into events.
        required: false
        default: '10'
      start_index:
        description: Start index inside finished archive events.
        required: false
        default: '0'
      limit_total:
        description: Number of finished events to probe.
        required: false
        default: '10'
      wait_ms:
        description: Browser wait between page actions.
        required: false
        default: '3000'
      pause_seconds:
        description: Pause between event probes.
        required: false
        default: '0.5'
      skip_bet365_filter:
        description: Skip applying visual OddsPortal bet365 filter. Provider 549 extraction still used.
        required: false
        default: 'true'

jobs:
  direct-match-event-probe:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    env:
      PYTHONUNBUFFERED: '1'

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        shell: bash
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements-oddsportal.txt
          python -m playwright install --with-deps chromium

      - name: Check OddsPortal auth/session secret exists
        shell: bash
        env:
          ODDSPORTAL_USERNAME: ${{ secrets.ODDSPORTAL_USERNAME }}
          ODDSPORTAL_PASSWORD: ${{ secrets.ODDSPORTAL_PASSWORD }}
          ODDSPORTAL_STORAGE_STATE_B64: ${{ secrets.ODDSPORTAL_STORAGE_STATE_B64 }}
          ODDSPORTAL_COOKIES_JSON: ${{ secrets.ODDSPORTAL_COOKIES_JSON }}
          ODDSPORTAL_COOKIES_JSON_B64: ${{ secrets.ODDSPORTAL_COOKIES_JSON_B64 }}
        run: |
          if [ -z "$ODDSPORTAL_STORAGE_STATE_B64" ] && [ -z "$ODDSPORTAL_COOKIES_JSON" ] && [ -z "$ODDSPORTAL_COOKIES_JSON_B64" ] && { [ -z "$ODDSPORTAL_USERNAME" ] || [ -z "$ODDSPORTAL_PASSWORD" ]; }; then
            echo "Set ODDSPORTAL_COOKIES_JSON, ODDSPORTAL_COOKIES_JSON_B64, ODDSPORTAL_STORAGE_STATE_B64, or both ODDSPORTAL_USERNAME and ODDSPORTAL_PASSWORD as repository secrets."
            exit 2
          fi
          echo "OddsPortal auth/session secret found."

      - name: Run direct match-event endpoint probe
        shell: bash
        env:
          ODDSPORTAL_USERNAME: ${{ secrets.ODDSPORTAL_USERNAME }}
          ODDSPORTAL_PASSWORD: ${{ secrets.ODDSPORTAL_PASSWORD }}
          ODDSPORTAL_STORAGE_STATE_B64: ${{ secrets.ODDSPORTAL_STORAGE_STATE_B64 }}
          ODDSPORTAL_COOKIES_JSON: ${{ secrets.ODDSPORTAL_COOKIES_JSON }}
          ODDSPORTAL_COOKIES_JSON_B64: ${{ secrets.ODDSPORTAL_COOKIES_JSON_B64 }}
        run: |
          EXTRA_FLAGS=""
          if [ "${{ github.event.inputs.skip_bet365_filter }}" = "true" ]; then
            EXTRA_FLAGS="$EXTRA_FLAGS --skip-bet365-filter"
          fi

          python -u scripts/oddsportal_direct_match_event_probe.py \
            --results-urls-file data/oddsportal_major_results_urls.txt \
            --out artifacts/output/oddsportal-direct-match-event-probe \
            --limit-pages '${{ github.event.inputs.limit_pages }}' \
            --start-index '${{ github.event.inputs.start_index }}' \
            --limit-total '${{ github.event.inputs.limit_total }}' \
            --wait-ms '${{ github.event.inputs.wait_ms }}' \
            --pause-seconds '${{ github.event.inputs.pause_seconds }}' \
            $EXTRA_FLAGS

      - name: Upload safe direct match-event probe artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: oddsportal-direct-match-event-probe-safe
          path: |
            artifacts/output/oddsportal-direct-match-event-probe/run_summary.json
            artifacts/output/oddsportal-direct-match-event-probe/direct_match_event_probe_report.md
            artifacts/output/oddsportal-direct-match-event-probe/direct_match_event_probe.csv
            artifacts/output/oddsportal-direct-match-event-probe/archive_events_all.csv
            artifacts/output/oddsportal-direct-match-event-probe/archive_events_filtered.csv
          if-no-files-found: warn

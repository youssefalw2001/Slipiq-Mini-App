name: OddsPortal Match Discovery Probe

on:
  workflow_dispatch:
    inputs:
      limit_pages:
        description: Number of tournament results pages to inspect.
        required: false
        default: '5'
      wait_ms:
        description: Browser wait between page actions.
        required: false
        default: '4500'

jobs:
  match-discovery-probe:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    env:
      PYTHONUNBUFFERED: '1'

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        shell: bash
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements-oddsportal.txt
          python -m playwright install --with-deps chromium

      - name: Check OddsPortal auth/session secret exists
        shell: bash
        env:
          ODDSPORTAL_USERNAME: ${{ secrets.ODDSPORTAL_USERNAME }}
          ODDSPORTAL_PASSWORD: ${{ secrets.ODDSPORTAL_PASSWORD }}
          ODDSPORTAL_STORAGE_STATE_B64: ${{ secrets.ODDSPORTAL_STORAGE_STATE_B64 }}
          ODDSPORTAL_COOKIES_JSON: ${{ secrets.ODDSPORTAL_COOKIES_JSON }}
          ODDSPORTAL_COOKIES_JSON_B64: ${{ secrets.ODDSPORTAL_COOKIES_JSON_B64 }}
        run: |
          if [ -z "$ODDSPORTAL_STORAGE_STATE_B64" ] && [ -z "$ODDSPORTAL_COOKIES_JSON" ] && [ -z "$ODDSPORTAL_COOKIES_JSON_B64" ] && { [ -z "$ODDSPORTAL_USERNAME" ] || [ -z "$ODDSPORTAL_PASSWORD" ]; }; then
            echo "Set ODDSPORTAL_COOKIES_JSON, ODDSPORTAL_COOKIES_JSON_B64, ODDSPORTAL_STORAGE_STATE_B64, or both ODDSPORTAL_USERNAME and ODDSPORTAL_PASSWORD as repository secrets."
            exit 2
          fi
          echo "OddsPortal auth/session secret found."

      - name: Run match discovery probe
        shell: bash
        env:
          ODDSPORTAL_USERNAME: ${{ secrets.ODDSPORTAL_USERNAME }}
          ODDSPORTAL_PASSWORD: ${{ secrets.ODDSPORTAL_PASSWORD }}
          ODDSPORTAL_STORAGE_STATE_B64: ${{ secrets.ODDSPORTAL_STORAGE_STATE_B64 }}
          ODDSPORTAL_COOKIES_JSON: ${{ secrets.ODDSPORTAL_COOKIES_JSON }}
          ODDSPORTAL_COOKIES_JSON_B64: ${{ secrets.ODDSPORTAL_COOKIES_JSON_B64 }}
        run: |
          python -u scripts/oddsportal_match_discovery_probe.py \
            --results-urls-file data/oddsportal_major_results_urls.txt \
            --out artifacts/output/oddsportal-match-discovery-probe \
            --limit-pages '${{ github.event.inputs.limit_pages }}' \
            --wait-ms '${{ github.event.inputs.wait_ms }}'

      - name: Upload safe match discovery artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: oddsportal-match-discovery-probe-safe
          path: |
            artifacts/output/oddsportal-match-discovery-probe/run_summary.json
            artifacts/output/oddsportal-match-discovery-probe/discovery_summary.json
            artifacts/output/oddsportal-match-discovery-probe/discovery_report.md
            artifacts/output/oddsportal-match-discovery-probe/page_stats.csv
            artifacts/output/oddsportal-match-discovery-probe/discovered_match_urls.csv
            artifacts/output/oddsportal-match-discovery-probe/link_inventory.csv
            artifacts/output/oddsportal-match-discovery-probe/page_samples/**
          if-no-files-found: warn

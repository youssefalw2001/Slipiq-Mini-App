name: OddsPortal Network Probe

on:
  workflow_dispatch:
    inputs:
      results_url:
        description: Tournament results URL to probe.
        required: false
        default: 'https://www.oddsportal.com/tennis/italy/atp-rome-2025/results/'
      match_url:
        description: Match Correct Score 1st Set URL to probe.
        required: false
        default: 'https://www.oddsportal.com/tennis/h2h/ofner-sebastian-h6vs3iR2/sinner-jannik-6HdC3z4H/#xhTpdK0l:cs;12'
      wait_ms:
        description: Browser wait between page actions.
        required: false
        default: '4500'
      max_body_bytes:
        description: Max bytes saved per response body.
        required: false
        default: '750000'

jobs:
  network-probe:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    env:
      PYTHONUNBUFFERED: '1'

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        shell: bash
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements-oddsportal.txt
          python -m playwright install --with-deps chromium

      - name: Check OddsPortal auth/session secret exists
        shell: bash
        env:
          ODDSPORTAL_USERNAME: ${{ secrets.ODDSPORTAL_USERNAME }}
          ODDSPORTAL_PASSWORD: ${{ secrets.ODDSPORTAL_PASSWORD }}
          ODDSPORTAL_STORAGE_STATE_B64: ${{ secrets.ODDSPORTAL_STORAGE_STATE_B64 }}
          ODDSPORTAL_COOKIES_JSON: ${{ secrets.ODDSPORTAL_COOKIES_JSON }}
          ODDSPORTAL_COOKIES_JSON_B64: ${{ secrets.ODDSPORTAL_COOKIES_JSON_B64 }}
        run: |
          if [ -z "$ODDSPORTAL_STORAGE_STATE_B64" ] && [ -z "$ODDSPORTAL_COOKIES_JSON" ] && [ -z "$ODDSPORTAL_COOKIES_JSON_B64" ] && { [ -z "$ODDSPORTAL_USERNAME" ] || [ -z "$ODDSPORTAL_PASSWORD" ]; }; then
            echo "Set ODDSPORTAL_COOKIES_JSON, ODDSPORTAL_COOKIES_JSON_B64, ODDSPORTAL_STORAGE_STATE_B64, or both ODDSPORTAL_USERNAME and ODDSPORTAL_PASSWORD as repository secrets."
            exit 2
          fi
          echo "OddsPortal auth/session secret found."

      - name: Run OddsPortal network probe
        shell: bash
        env:
          ODDSPORTAL_USERNAME: ${{ secrets.ODDSPORTAL_USERNAME }}
          ODDSPORTAL_PASSWORD: ${{ secrets.ODDSPORTAL_PASSWORD }}
          ODDSPORTAL_STORAGE_STATE_B64: ${{ secrets.ODDSPORTAL_STORAGE_STATE_B64 }}
          ODDSPORTAL_COOKIES_JSON: ${{ secrets.ODDSPORTAL_COOKIES_JSON }}
          ODDSPORTAL_COOKIES_JSON_B64: ${{ secrets.ODDSPORTAL_COOKIES_JSON_B64 }}
        run: |
          python -u scripts/oddsportal_network_probe.py \
            --results-url '${{ github.event.inputs.results_url }}' \
            --match-url '${{ github.event.inputs.match_url }}' \
            --out artifacts/output/oddsportal-network-probe \
            --wait-ms '${{ github.event.inputs.wait_ms }}' \
            --max-body-bytes '${{ github.event.inputs.max_body_bytes }}'

      - name: Upload network probe artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: oddsportal-network-probe
          path: artifacts/output/**
          if-no-files-found: warn

name: OddsPortal Live V3 Paper Scanner

on:
  workflow_dispatch:
    inputs:
      limit_matches:
        description: Maximum discovered OddsPortal tennis match links to price-check.
        required: false
        default: '50'
      wait_ms:
        description: Browser wait per page/interaction.
        required: false
        default: '4000'
      pause_seconds:
        description: Pause between constructed endpoint requests.
        required: false
        default: '0.25'
      discovery_days:
        description: Number of UTC dates to scan through direct ajax-nextgames feeds.
        required: false
        default: '3'
      discovery_pages:
        description: Number of ajax-nextgames pages per date to scan.
        required: false
        default: '3'
      exclude_doubles:
        description: Skip doubles/team matches containing slash-separated player names.
        required: false
        default: 'true'
        type: choice
        options:
          - 'true'
          - 'false'
      dry_run:
        description: Keep true for artifact-only smoke tests. false allows Supabase writes when write_supabase is true.
        required: false
        default: 'true'
        type: choice
        options:
          - 'true'
          - 'false'
      write_supabase:
        description: Write raw checks/signals to Supabase. Ignored when dry_run is true.
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'
      promote_buckets:
        description: Comma-separated CEO buckets to promote into private_v3_signal_log.
        required: false
        default: 'PRICE_ONLY_REVIEW,A_PLUS,A,MAIN'
      discovery_urls:
        description: Optional comma-separated extra OddsPortal discovery URLs. Leave blank for defaults plus ajax feeds.
        required: false
        default: ''

jobs:
  live-v3-paper-scanner:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    env:
      PYTHONUNBUFFERED: '1'

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        shell: bash
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements-oddsportal.txt
          python -m playwright install --with-deps chromium

      - name: Check OddsPortal auth/session secret exists
        shell: bash
        env:
          ODDSPORTAL_USERNAME: ${{ secrets.ODDSPORTAL_USERNAME }}
          ODDSPORTAL_PASSWORD: ${{ secrets.ODDSPORTAL_PASSWORD }}
          ODDSPORTAL_STORAGE_STATE_B64: ${{ secrets.ODDSPORTAL_STORAGE_STATE_B64 }}
          ODDSPORTAL_COOKIES_JSON: ${{ secrets.ODDSPORTAL_COOKIES_JSON }}
          ODDSPORTAL_COOKIES_JSON_B64: ${{ secrets.ODDSPORTAL_COOKIES_JSON_B64 }}
        run: |
          if [ -z "$ODDSPORTAL_STORAGE_STATE_B64" ] && [ -z "$ODDSPORTAL_COOKIES_JSON" ] && [ -z "$ODDSPORTAL_COOKIES_JSON_B64" ] && { [ -z "$ODDSPORTAL_USERNAME" ] || [ -z "$ODDSPORTAL_PASSWORD" ]; }; then
            echo "Set an OddsPortal cookie/storage secret or username/password repository secrets."
            exit 2
          fi
          echo "OddsPortal auth/session secret found."

      - name: Check Supabase secrets if writes requested
        if: ${{ github.event.inputs.write_supabase == 'true' && github.event.inputs.dry_run == 'false' }}
        shell: bash
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: |
          if [ -z "$SUPABASE_URL" ] || { [ -z "$SUPABASE_SERVICE_ROLE_KEY" ] && [ -z "$SUPABASE_SERVICE_KEY" ]; }; then
            echo "Set SUPABASE_URL and SUPABASE_SERVICE_ROLE_KEY/SUPABASE_SERVICE_KEY before enabling writes."
            exit 2
          fi
          echo "Supabase write secrets found."

      - name: Run live V3 paper scanner
        shell: bash
        env:
          ODDSPORTAL_USERNAME: ${{ secrets.ODDSPORTAL_USERNAME }}
          ODDSPORTAL_PASSWORD: ${{ secrets.ODDSPORTAL_PASSWORD }}
          ODDSPORTAL_STORAGE_STATE_B64: ${{ secrets.ODDSPORTAL_STORAGE_STATE_B64 }}
          ODDSPORTAL_COOKIES_JSON: ${{ secrets.ODDSPORTAL_COOKIES_JSON }}
          ODDSPORTAL_COOKIES_JSON_B64: ${{ secrets.ODDSPORTAL_COOKIES_JSON_B64 }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: |
          DISCOVERY_URLS='${{ github.event.inputs.discovery_urls }}'
          EXTRA_DISCOVERY=()
          if [ -n "$DISCOVERY_URLS" ]; then
            EXTRA_DISCOVERY=(--discovery-urls "$DISCOVERY_URLS")
          fi
          python -u scripts/oddsportal_live_v3_paper_scanner.py \
            --out artifacts/output/oddsportal-live-v3-paper-scanner \
            --limit-matches '${{ github.event.inputs.limit_matches }}' \
            --wait-ms '${{ github.event.inputs.wait_ms }}' \
            --pause-seconds '${{ github.event.inputs.pause_seconds }}' \
            --discovery-days '${{ github.event.inputs.discovery_days }}' \
            --discovery-pages '${{ github.event.inputs.discovery_pages }}' \
            --exclude-doubles '${{ github.event.inputs.exclude_doubles }}' \
            --dry-run '${{ github.event.inputs.dry_run }}' \
            --write-supabase '${{ github.event.inputs.write_supabase }}' \
            --promote-buckets '${{ github.event.inputs.promote_buckets }}' \
            "${EXTRA_DISCOVERY[@]}"

      - name: Upload live scanner artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: oddsportal-live-v3-paper-scanner
          path: |
            artifacts/output/oddsportal-live-v3-paper-scanner/run_summary.json
            artifacts/output/oddsportal-live-v3-paper-scanner/live_v3_price_checks.csv
            artifacts/output/oddsportal-live-v3-paper-scanner/live_v3_discovered_matches.csv
            artifacts/output/oddsportal-live-v3-paper-scanner/live_v3_report.md
          if-no-files-found: warn

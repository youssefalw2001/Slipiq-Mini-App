name: RapidAPI Odds Feed Probe

on:
  workflow_dispatch:
    inputs:
      mode:
        description: Label for this run, e.g. smoke, discovery, live, historical.
        required: false
        default: rapidapi-discovery-small
      rapidapi_host:
        description: RapidAPI host. Do not include https://.
        required: true
        default: odds-feed.p.rapidapi.com
      endpoint:
        description: API endpoint path.
        required: true
        default: /api/v1/markets/feed
      params:
        description: Query params as JSON or key=value&key2=value2. Leave blank to use params_file.
        required: false
        default: ''
      params_file:
        description: Optional repo JSON file with multiple parameter sets.
        required: false
        default: data/rapidapi_oddsfeed_discovery_params.json
      bookmaker:
        description: Target bookmaker name to search for in the response.
        required: false
        default: '1xBet'
      grouped_threshold:
        description: Minimum grouped V3 odds for actionable WATCH/OFFICIAL candidates.
        required: false
        default: '3.3'
      max_requests:
        description: Max requests if params_file contains multiple parameter sets. Keep small on free plan.
        required: false
        default: '8'

jobs:
  probe:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run RapidAPI odds feed probe
        shell: bash
        env:
          RAPIDAPI_KEY: ${{ secrets.RAPIDAPI_KEY }}
        run: |
          set -e
          PARAM_ARGS=""
          if [ -n '${{ github.event.inputs.params }}' ]; then
            PARAM_ARGS="--params='${{ github.event.inputs.params }}'"
          elif [ -n '${{ github.event.inputs.params_file }}' ]; then
            PARAM_ARGS="--params-file='${{ github.event.inputs.params_file }}'"
          fi

          eval "node scripts/rapidapi-oddsfeed-probe.mjs \
            --mode='${{ github.event.inputs.mode }}' \
            --host='${{ github.event.inputs.rapidapi_host }}' \
            --endpoint='${{ github.event.inputs.endpoint }}' \
            $PARAM_ARGS \
            --bookmaker='${{ github.event.inputs.bookmaker }}' \
            --max-requests='${{ github.event.inputs.max_requests }}' \
            --out=artifacts/output/rapidapi-oddsfeed-probe"

      - name: Normalize RapidAPI output into SlipIQ V3 summary
        if: always()
        shell: bash
        run: |
          set -e
          if [ -f artifacts/output/rapidapi-oddsfeed-probe/normalized_candidate_odds.csv ]; then
            node scripts/normalize-rapidapi-v3-summary.mjs \
              --input=artifacts/output/rapidapi-oddsfeed-probe \
              --bookmaker='${{ github.event.inputs.bookmaker }}' \
              --threshold='${{ github.event.inputs.grouped_threshold }}'
          else
            echo "normalized_candidate_odds.csv was not created; skipping V3 normalization."
          fi

      - name: Dry-run Supabase pusher shape check
        if: always()
        shell: bash
        env:
          SUPABASE_URL: https://dry-run-only.supabase.co
          SUPABASE_SERVICE_ROLE_KEY: dry-run-only
        run: |
          set -e
          if [ -f artifacts/output/rapidapi-oddsfeed-probe/upcoming_firstset_summary.json ]; then
            node scripts/push-v3-signals-to-supabase.mjs \
              --summary=artifacts/output/rapidapi-oddsfeed-probe/upcoming_firstset_summary.json \
              --dry-run=true \
              --require-p2-match-odds=false
          else
            echo "upcoming_firstset_summary.json was not created; skipping Supabase pusher shape check."
          fi

      - name: Upload RapidAPI probe artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: rapidapi-oddsfeed-probe-${{ github.event.inputs.mode }}
          path: artifacts/output/rapidapi-oddsfeed-probe/**
          if-no-files-found: warn
